<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>forge review — 指摘一覧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap">
  <style>
    /* =====================================================================
       基本レイアウト（ダーク・開発者ツール的審美性）
    ===================================================================== */
    :root {
      --bg:        #0d1117;
      --bg-card:   #161b22;
      --bg-hover:  #1c2128;
      --border:    #30363d;
      --text:      #c9d1d9;
      --text-muted:#8b949e;
      --text-head: #f0f6fc;

      --critical:  #ff4d4d;
      --major:     #ffab00;
      --minor:     #52c41a;
      --skipped:   #666;
      --info:      #58a6ff;

      --badge-fix:    #238636;
      --badge-skip:   #444;
      --badge-review: #9e6a03;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* =====================================================================
       ヘッダー
    ===================================================================== */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-head);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--minor);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.ended { background: var(--skipped); }
    #status-dot.connecting { background: var(--major); }

    #session-info {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #summary {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }
    #summary .cnt { font-weight: 600; }
    #summary .cnt.critical { color: var(--critical); }
    #summary .cnt.major    { color: var(--major); }
    #summary .cnt.minor    { color: var(--minor); }

    /* =====================================================================
       フィルタータブ
    ===================================================================== */
    #filters {
      padding: 8px 20px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-wrap: wrap;
    }

    .tab {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .tab:hover { background: var(--bg-hover); color: var(--text); }
    .tab.active { background: var(--info); border-color: var(--info); color: #fff; }

    /* =====================================================================
       指摘カード
    ===================================================================== */
    #card-list {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      border-left: 3px solid var(--border);
      transition: background 0.1s;
    }
    .card:hover { background: var(--bg-hover); }

    .card.sev-critical { border-left-color: var(--critical); }
    .card.sev-major    { border-left-color: var(--major); }
    .card.sev-minor    { border-left-color: var(--minor); }
    .card.sev-skipped  { border-left-color: var(--skipped); opacity: 0.6; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sev-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .sev-badge.critical { background: color-mix(in srgb, var(--critical) 20%, transparent); color: var(--critical); }
    .sev-badge.major    { background: color-mix(in srgb, var(--major)    20%, transparent); color: var(--major); }
    .sev-badge.minor    { background: color-mix(in srgb, var(--minor)    20%, transparent); color: var(--minor); }
    .sev-badge.skipped  { background: color-mix(in srgb, var(--skipped)  20%, transparent); color: var(--skipped); }

    .id-badge {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-head);
      flex: 1;
    }

    /* AI 推奨バッジ */
    .rec-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .rec-badge.fix    { background: var(--badge-fix);    color: #7ee787; }
    .rec-badge.skip   { background: var(--badge-skip);   color: var(--text-muted); }
    .rec-badge.review { background: var(--badge-review); color: #e3b341; }

    /* AF マーク（auto_fixable） */
    .af-badge {
      font-size: 10px;
      color: var(--minor);
      flex-shrink: 0;
    }

    /* ステータス表示 */
    .status-badge {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .status-badge.fixed    { color: var(--minor); }
    .status-badge.skipped  { color: var(--skipped); }
    .status-badge.in_progress { color: var(--info); }

    /* perspective */
    .perspective-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* 理由テキスト */
    .reason-text {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      padding-left: 4px;
      border-left: 2px solid var(--border);
    }

    /* =====================================================================
       空・終了・接続中メッセージ
    ===================================================================== */
    #empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      display: none;
    }

    #session-end-banner {
      margin: 16px 20px 0;
      padding: 10px 16px;
      background: color-mix(in srgb, var(--skipped) 15%, transparent);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      display: none;
    }
  </style>
</head>
<body>

<div id="header">
  <span id="status-dot" class="connecting" title="SSE 接続中"></span>
  <h1>forge review — 指摘一覧</h1>
  <span id="session-info">接続中...</span>
  <div id="summary">
    <span><span class="cnt critical" id="cnt-critical">0</span> 🔴</span>
    <span><span class="cnt major"    id="cnt-major">0</span> 🟡</span>
    <span><span class="cnt minor"    id="cnt-minor">0</span> 🟢</span>
    <span><span class="cnt"          id="cnt-skip">0</span> ❌</span>
  </div>
</div>

<div id="filters">
  <button class="tab active" data-filter="all">All</button>
  <button class="tab" data-filter="critical">🔴 Critical</button>
  <button class="tab" data-filter="major">🟡 Major</button>
  <button class="tab" data-filter="minor">🟢 Minor</button>
  <button class="tab" data-filter="skipped">❌ Skipped</button>
</div>

<div id="session-end-banner">セッションが終了しました</div>
<div id="card-list"></div>
<div id="empty-msg">指摘事項はまだありません</div>

<script>
  // =====================================================================
  // 状態
  // =====================================================================
  let currentFilter = 'all';
  let currentItems  = [];

  // =====================================================================
  // フィルタータブ
  // =====================================================================
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderCards(currentItems);
    });
  });

  // =====================================================================
  // severity → 表示文字列
  // =====================================================================
  const SEV_LABEL = { critical: '🔴 CRITICAL', major: '🟡 MAJOR', minor: '🟢 MINOR' };
  const REC_LABEL = { fix: 'fix', skip: 'skip', needs_review: 'review' };

  function buildCard(item) {
    const sev  = item.severity || 'minor';
    const card = document.createElement('div');
    card.className = `card sev-${sev}`;
    card.dataset.severity = sev;

    // ---- ヘッダー行 ----
    const hdr = document.createElement('div');
    hdr.className = 'card-header';

    const sevBadge = document.createElement('span');
    sevBadge.className = `sev-badge ${sev}`;
    sevBadge.textContent = SEV_LABEL[sev] || sev.toUpperCase();

    const idBadge = document.createElement('span');
    idBadge.className = 'id-badge';
    idBadge.textContent = `#${item.id}`;

    const titleEl = document.createElement('span');
    titleEl.className = 'title';
    titleEl.textContent = item.title || '（タイトルなし）';

    hdr.append(sevBadge, idBadge, titleEl);

    // ステータス
    if (item.status && item.status !== 'pending') {
      const sb = document.createElement('span');
      sb.className = `status-badge ${item.status}`;
      sb.textContent = item.status;
      hdr.appendChild(sb);
    }

    // AI 推奨
    if (item.recommendation) {
      const rec = document.createElement('span');
      const key = REC_LABEL[item.recommendation] || item.recommendation;
      rec.className = `rec-badge ${key}`;
      rec.textContent = key;
      hdr.appendChild(rec);
    }

    // auto_fixable
    if (item.auto_fixable) {
      const af = document.createElement('span');
      af.className = 'af-badge';
      af.title = 'auto fixable';
      af.textContent = '✅ AF';
      hdr.appendChild(af);
    }

    // perspective
    const perspectives = item.perspectives || (item.perspective ? [item.perspective] : []);
    perspectives.forEach(p => {
      const pt = document.createElement('span');
      pt.className = 'perspective-tag';
      pt.textContent = p;
      hdr.appendChild(pt);
    });

    card.appendChild(hdr);

    // ---- 理由 / スキップ理由 ----
    const reasonText = item.reason || item.skip_reason;
    if (reasonText) {
      const r = document.createElement('div');
      r.className = 'reason-text';
      r.textContent = reasonText;
      card.appendChild(r);
    }

    return card;
  }

  function renderCards(items) {
    const list = document.getElementById('card-list');
    const emptyMsg = document.getElementById('empty-msg');
    list.innerHTML = '';

    const filtered = currentFilter === 'all'
      ? items
      : items.filter(it => {
          if (currentFilter === 'skipped') return it.status === 'skipped';
          return it.severity === currentFilter;
        });

    if (filtered.length === 0) {
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
      filtered.forEach(item => list.appendChild(buildCard(item)));
    }
  }

  function updateSummary(items) {
    const counts = { critical: 0, major: 0, minor: 0, skip: 0 };
    items.forEach(it => {
      if (it.status === 'skipped') { counts.skip++; return; }
      if (it.severity === 'critical') counts.critical++;
      else if (it.severity === 'major') counts.major++;
      else if (it.severity === 'minor') counts.minor++;
    });
    document.getElementById('cnt-critical').textContent = counts.critical;
    document.getElementById('cnt-major').textContent    = counts.major;
    document.getElementById('cnt-minor').textContent    = counts.minor;
    document.getElementById('cnt-skip').textContent     = counts.skip;
  }

  // =====================================================================
  // /session データ取得・レンダリング
  // =====================================================================
  async function fetchAndRender() {
    try {
      const res = await fetch('/session');
      if (!res.ok) return;
      const data = await res.json();

      // session_dir 表示
      const infoEl = document.getElementById('session-info');
      infoEl.textContent = data.session_dir || '';

      // plan.yaml から items を取得
      const planFile = data.files && data.files['plan.yaml'];
      const items = (planFile && planFile.exists && planFile.content && planFile.content.items) || [];
      currentItems = Array.isArray(items) ? items : [];

      updateSummary(currentItems);
      renderCards(currentItems);
    } catch (e) {
      // ネットワークエラー時は無視
    }
  }

  // =====================================================================
  // SSE 接続
  // =====================================================================
  const dot = document.getElementById('status-dot');

  function connectSSE() {
    const es = new EventSource('/sse');

    es.onopen = () => {
      dot.className = '';   // connecting クラス除去
      // 再接続時も最新状態を取得
      fetchAndRender();
    };

    es.addEventListener('update', () => {
      fetchAndRender();
    });

    es.addEventListener('session_end', () => {
      dot.classList.add('ended');
      document.getElementById('session-end-banner').style.display = 'block';
      es.close();
    });

    es.onerror = () => {
      dot.classList.add('connecting');
    };
  }

  // =====================================================================
  // 初期化
  // =====================================================================
  fetchAndRender();
  connectSSE();
</script>
</body>
</html>
