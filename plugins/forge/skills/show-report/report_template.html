<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="10">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge Review Report</title>
  <style>
    :root {
      --bg: #faf9f6;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text: #1a1a1a;
      --text-muted: #888;
      --link: #0066cc;
      --header-bg: #1a1a1a;
      --header-text: #f5f5f0;
      --mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;

      /* ステータスカラー */
      --status-pending-bg: #e0e0e0; --status-pending-text: #666;
      --status-in-progress-bg: #bbdefb; --status-in-progress-text: #1565c0;
      --status-fixed-bg: #c8e6c9; --status-fixed-text: #2e7d32;
      --status-skipped-bg: #ffe0b2; --status-skipped-text: #e65100;
      --status-needs-review-bg: #ffcdd2; --status-needs-review-text: #c62828;

      /* 進捗バーカラー */
      --bar-fixed: #4caf50;
      --bar-skipped: #ff9800;
      --bar-needs-review: #f44336;
      --bar-in-progress: #2196f3;
      --bar-pending: #bdbdbd;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --surface: #252525;
        --border: #3a3a3a;
        --text: #e0e0e0;
        --text-muted: #999;
        --link: #64b5f6;
        --header-bg: #111;
        --header-text: #e8e8e0;

        --status-pending-bg: #424242; --status-pending-text: #bbb;
        --status-in-progress-bg: #1e3a5f; --status-in-progress-text: #90caf9;
        --status-fixed-bg: #1b5e20; --status-fixed-text: #a5d6a7;
        --status-skipped-bg: #4e2a00; --status-skipped-text: #ffcc80;
        --status-needs-review-bg: #4a1010; --status-needs-review-text: #ef9a9a;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ---- ヘッダー ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.25rem; font-weight: 700; }
    .header-meta { font-size: 0.8rem; opacity: 0.7; text-align: right; }

    /* ---- メインコンテンツ ---- */
    .main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }

    /* ---- セクション ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 1.25rem;
    }
    .section-header {
      padding: 0.625rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      border-radius: 6px 6px 0 0;
    }
    .section-body { padding: 1rem; }

    /* ---- 参照ファイル ---- */
    .refs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }
    .refs-group h4 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }
    .refs-group ul {
      list-style: none;
      padding: 0;
    }
    .refs-group li {
      padding: 0.2rem 0;
      font-size: 0.8125rem;
    }

    /* ---- 進捗バー ---- */
    .progress-container { margin-bottom: 0.75rem; }
    .progress-bar {
      display: flex;
      height: 24px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bar-pending);
    }
    .progress-segment {
      height: 100%;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6875rem;
      font-weight: 600;
      color: #fff;
      min-width: 0;
      overflow: hidden;
    }
    .progress-legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }
    .progress-legend span::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: middle;
    }
    .legend-fixed::before { background: var(--bar-fixed); }
    .legend-skipped::before { background: var(--bar-skipped); }
    .legend-needs-review::before { background: var(--bar-needs-review); }
    .legend-in-progress::before { background: var(--bar-in-progress); }
    .legend-pending::before { background: var(--bar-pending); }

    /* ---- テーブル ---- */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }
    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-weight: 600;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
    }
    td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }

    /* 重大度アイコン */
    .severity { font-size: 1rem; text-align: center; }

    /* ステータスバッジ */
    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.6875rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-pending { background: var(--status-pending-bg); color: var(--status-pending-text); }
    .badge-in_progress { background: var(--status-in-progress-bg); color: var(--status-in-progress-text); }
    .badge-fixed { background: var(--status-fixed-bg); color: var(--status-fixed-text); }
    .badge-skipped { background: var(--status-skipped-bg); color: var(--status-skipped-text); }
    .badge-needs_review { background: var(--status-needs-review-bg); color: var(--status-needs-review-text); }

    /* AI推奨 */
    .rec-fix { color: var(--status-fixed-text); font-weight: 600; }
    .rec-skip { color: var(--status-skipped-text); font-weight: 600; }
    .rec-needs_review { color: var(--status-needs-review-text); font-weight: 600; }

    /* ファイルリンク */
    a.file-link {
      color: var(--link);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.75rem;
    }
    a.file-link:hover { text-decoration: underline; }
    .file-list { display: flex; flex-direction: column; gap: 0.125rem; }

    /* ---- フッター ---- */
    .footer {
      text-align: center;
      padding: 1rem 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Forge Review Report</h1>
      <div id="header-detail" style="font-size:0.8rem; opacity:0.7; margin-top:0.25rem;"></div>
    </div>
    <div class="header-meta" id="header-meta"></div>
  </div>

  <div class="main">
    <div id="refs-section"></div>
    <div id="progress-section"></div>
    <div id="items-section"></div>
  </div>

  <div class="footer" id="footer"></div>

  <script>
    // ---- 埋め込みデータ（generate_report.py が注入） ----
    /*__EMBEDDED_DATA__*/

    // ---- ユーティリティ ----
    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const REVIEW_TYPE_LABELS = {
      code: 'コード', requirement: '要件定義', design: '設計', plan: '計画', generic: '汎用'
    };

    const SEVERITY_ICONS = { critical: '🔴', major: '🟡', minor: '🟢' };
    const SEVERITY_ORDER = { critical: 0, major: 1, minor: 2 };

    const STATUS_LABELS = {
      pending: 'Pending', in_progress: 'In Progress', fixed: 'Fixed',
      skipped: 'Skipped', needs_review: 'Needs Review'
    };

    const REC_LABELS = { fix: '修正', skip: '却下', needs_review: '要確認' };

    function makeFileLink(pathStr, projectRoot) {
      if (!pathStr) return '';
      var parts = pathStr.split(':');
      var filePath = parts[0];
      var line = parts[1] || '';
      var absPath = filePath.startsWith('/') ? filePath : projectRoot + '/' + filePath;
      var href = line ? 'vscode://file/' + absPath + ':' + line : 'vscode://file/' + absPath;
      return '<a class="file-link" href="' + escapeHtml(href) + '">' + escapeHtml(pathStr) + '</a>';
    }

    function makeFileLinks(paths, projectRoot) {
      if (!paths || paths.length === 0) return '';
      var links = paths.map(function(p) {
        var pathStr = typeof p === 'object' ? p.path || '' : p;
        return makeFileLink(pathStr, projectRoot);
      }).filter(Boolean);
      return '<div class="file-list">' + links.join('') + '</div>';
    }

    // ---- スクロール位置の保存・復元 ----
    var SCROLL_KEY = 'forge_report_scroll';
    window.addEventListener('beforeunload', function() {
      sessionStorage.setItem(SCROLL_KEY, window.scrollY);
    });

    // ---- レンダリング ----
    function render() {
      var d = EMBEDDED_DATA;
      var session = d.session || {};
      var plan = d.plan || {};
      var evaluation = d.evaluation || {};
      var refs = d.refs || null;
      var locations = d.locations || {};
      var projectRoot = d.project_root || '';
      var items = plan.items || [];
      var evalItems = {};

      // evaluation.items を id でインデックス
      if (evaluation && evaluation.items) {
        evaluation.items.forEach(function(ei) { evalItems[ei.id] = ei; });
      }

      var hasEvaluation = Object.keys(evalItems).length > 0;

      // ---- ヘッダー ----
      var typeLabel = REVIEW_TYPE_LABELS[session.review_type] || session.review_type || '';
      document.getElementById('header-detail').innerHTML =
        'レビュー種別: <strong>' + escapeHtml(typeLabel) + '</strong>' +
        ' &nbsp;|&nbsp; エンジン: <strong>' + escapeHtml(session.engine || '') + '</strong>';

      var startedAt = session.started_at || '';
      if (startedAt) {
        try {
          var dt = new Date(startedAt);
          startedAt = dt.toLocaleString('ja-JP');
        } catch(e) {}
      }
      document.getElementById('header-meta').innerHTML = '開始: ' + escapeHtml(startedAt);

      // ---- 参照ファイル ----
      if (refs) {
        var refsHtml = '<div class="section"><div class="section-header">参照ファイル</div><div class="section-body"><div class="refs-grid">';

        if (refs.target_files && refs.target_files.length > 0) {
          refsHtml += '<div class="refs-group"><h4>対象ファイル</h4><ul>';
          refs.target_files.forEach(function(f) {
            var p = typeof f === 'object' ? f.path || '' : f;
            refsHtml += '<li>' + makeFileLink(p, projectRoot) + '</li>';
          });
          refsHtml += '</ul></div>';
        }

        if (refs.reference_docs && refs.reference_docs.length > 0) {
          refsHtml += '<div class="refs-group"><h4>参考文書</h4><ul>';
          refs.reference_docs.forEach(function(f) {
            var p = typeof f === 'object' ? f.path || '' : f;
            refsHtml += '<li>' + makeFileLink(p, projectRoot) + '</li>';
          });
          refsHtml += '</ul></div>';
        }

        if (refs.related_code && refs.related_code.length > 0) {
          refsHtml += '<div class="refs-group"><h4>関連コード</h4><ul>';
          refs.related_code.forEach(function(f) {
            var p = typeof f === 'object' ? f.path || '' : f;
            var display = p;
            if (typeof f === 'object' && f.lines) display += ':' + f.lines;
            refsHtml += '<li>' + makeFileLink(display, projectRoot);
            if (typeof f === 'object' && f.reason) {
              refsHtml += ' <span style="color:var(--text-muted);font-size:0.75rem;">— ' + escapeHtml(f.reason) + '</span>';
            }
            refsHtml += '</li>';
          });
          refsHtml += '</ul></div>';
        }

        refsHtml += '</div></div></div>';
        document.getElementById('refs-section').innerHTML = refsHtml;
      }

      // ---- 進捗バー ----
      var counts = { fixed: 0, skipped: 0, needs_review: 0, in_progress: 0, pending: 0 };
      items.forEach(function(it) { counts[it.status] = (counts[it.status] || 0) + 1; });
      var total = items.length || 1;

      var barHtml = '<div class="section"><div class="section-header">進捗</div><div class="section-body">';
      barHtml += '<div class="progress-container"><div class="progress-bar">';

      var segments = [
        { key: 'fixed', color: 'var(--bar-fixed)' },
        { key: 'skipped', color: 'var(--bar-skipped)' },
        { key: 'needs_review', color: 'var(--bar-needs-review)' },
        { key: 'in_progress', color: 'var(--bar-in-progress)' },
        { key: 'pending', color: 'var(--bar-pending)' },
      ];

      segments.forEach(function(seg) {
        var pct = (counts[seg.key] / total * 100).toFixed(1);
        if (counts[seg.key] > 0) {
          barHtml += '<div class="progress-segment" style="width:' + pct + '%;background:' + seg.color + ';">';
          barHtml += (parseFloat(pct) >= 8 ? counts[seg.key] : '') + '</div>';
        }
      });

      barHtml += '</div><div class="progress-legend">';
      barHtml += '<span class="legend-fixed">Fixed: ' + counts.fixed + '</span>';
      barHtml += '<span class="legend-skipped">Skipped: ' + counts.skipped + '</span>';
      barHtml += '<span class="legend-needs-review">Needs Review: ' + counts.needs_review + '</span>';
      barHtml += '<span class="legend-in-progress">In Progress: ' + counts.in_progress + '</span>';
      barHtml += '<span class="legend-pending">Pending: ' + counts.pending + '</span>';
      barHtml += '</div></div></div></div>';
      document.getElementById('progress-section').innerHTML = barHtml;

      // ---- 項目一覧テーブル ----
      // severity 順ソート
      var sorted = items.slice().sort(function(a, b) {
        var sa = SEVERITY_ORDER[a.severity] !== undefined ? SEVERITY_ORDER[a.severity] : 99;
        var sb = SEVERITY_ORDER[b.severity] !== undefined ? SEVERITY_ORDER[b.severity] : 99;
        if (sa !== sb) return sa - sb;
        return (a.id || 0) - (b.id || 0);
      });

      var tableHtml = '<div class="section"><div class="section-header">指摘事項</div><div class="section-body">';
      tableHtml += '<table><thead><tr>';
      tableHtml += '<th style="width:3rem;text-align:center;">重大度</th>';
      tableHtml += '<th>タイトル</th>';
      tableHtml += '<th style="width:7rem;">ステータス</th>';
      if (hasEvaluation) tableHtml += '<th style="width:5rem;">AI推奨</th>';
      tableHtml += '<th>対象箇所</th>';
      tableHtml += '<th>修正ファイル</th>';
      tableHtml += '</tr></thead><tbody>';

      sorted.forEach(function(item) {
        var ei = evalItems[item.id] || {};
        var icon = SEVERITY_ICONS[item.severity] || '';
        var statusLabel = STATUS_LABELS[item.status] || item.status;
        var badgeClass = 'badge badge-' + (item.status || 'pending');

        tableHtml += '<tr>';
        tableHtml += '<td class="severity">' + icon + '</td>';
        tableHtml += '<td>' + escapeHtml(item.title || '') + '</td>';
        tableHtml += '<td><span class="' + badgeClass + '">' + escapeHtml(statusLabel) + '</span></td>';

        if (hasEvaluation) {
          var recLabel = REC_LABELS[ei.recommendation] || '';
          var recClass = ei.recommendation ? ('rec-' + ei.recommendation) : '';
          var autoMark = ei.auto_fixable ? ' ✅' : '';
          tableHtml += '<td><span class="' + recClass + '">' + escapeHtml(recLabel) + autoMark + '</span></td>';
        }

        // 対象箇所
        var loc = locations[String(item.id)] || '';
        tableHtml += '<td>' + (loc ? makeFileLink(loc, projectRoot) : '') + '</td>';

        // 修正ファイル
        var modFiles = item.files_modified || [];
        if (typeof modFiles === 'string') modFiles = modFiles ? [modFiles] : [];
        tableHtml += '<td>' + makeFileLinks(modFiles, projectRoot) + '</td>';

        tableHtml += '</tr>';
      });

      tableHtml += '</tbody></table></div></div>';
      document.getElementById('items-section').innerHTML = tableHtml;

      // ---- フッター ----
      var lastUpdated = session.last_updated || d.generated_at || '';
      if (lastUpdated) {
        try {
          var dt2 = new Date(lastUpdated);
          lastUpdated = dt2.toLocaleString('ja-JP');
        } catch(e) {}
      }
      document.getElementById('footer').innerHTML =
        '最終更新: ' + escapeHtml(lastUpdated) +
        ' &nbsp;|&nbsp; 自動リロード: 10秒間隔';

      // スクロール位置復元
      var savedScroll = sessionStorage.getItem(SCROLL_KEY);
      if (savedScroll) {
        window.scrollTo(0, parseInt(savedScroll, 10));
        sessionStorage.removeItem(SCROLL_KEY);
      }
    }

    render();
  </script>
</body>
</html>
