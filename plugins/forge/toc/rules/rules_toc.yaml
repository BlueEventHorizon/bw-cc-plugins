  plugins/forge/skills/start-uxui-design/docs/design_philosophy.md:
    doc_type: rule
    title: Design Philosophy
    purpose: "Provides an integrated framework for understanding design aesthetics across three layers: cognitive constraints (Fitts/Hick/Miller laws), structural tools (modular scale, color harmony, grids), and design directions (Rams, Norman, Tufte, wabi-sabi)"
    content_details:
      - Cognitive constraints (Fitts law touch targets, Hick law decision complexity, Miller law short-term memory limits, contrast ratio thresholds)
      - Modular scale ratios for size harmony (Major Second 1.125, Minor Third 1.200, Major Third 1.250, Perfect Fourth 1.333, Golden Ratio 1.618)
      - Color harmony models (complementary, analogous, triadic, split-complementary)
      - 60-30-10 color rule (60% dominant, 30% secondary, 10% accent)
      - 8pt grid and spacing scale (4-8-12-16-24-32-48-64pt)
      - Composition principles (symmetric balance, asymmetric balance, rhythm, visual weight, texture)
