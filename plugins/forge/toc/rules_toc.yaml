  plugins/forge/skills/review/docs/review_criteria_plan.md:
    doc_type: rule
    title: Plan Document Review Perspectives
    purpose: Defines plugin-default forge review criteria for plan documents (alignment and feasibility perspectives) when project-specific rules are absent; DocAdvisor may add project perspectives.
    content_details:
      - "Alignment: detect contradiction with requirements/design, missing tasks for mandatory features, and dependency order vs stated depends-on conflicts"
      - Implicit dependencies; incomplete requirement-ID coverage without exclusion rationale; missing test or verification tasks for major implementation work
      - "Feasibility: tasks infeasible under known technical constraints; tasks with missing or empty acceptance criteria"
      - Uneven task granularity; identified risks without mitigation; unidentified bottleneck impact on critical path; priority misaligned with business value or risk
      - Acceptance criteria too subjective or unmeasurable for objective verification
      - "Improvement: explicit traceability to requirement IDs and design elements; dependency visualization; milestone checkpoints"
      - "Improvement: split oversized tasks; add buffer for high-risk work; rewrite acceptance criteria with measurable outcomes"
      - Default perspectives when no project-specific review rules exist; false-positive note for post-design plan drift
      - "Severity tiers: fatal issues, quality issues, and improvement suggestions"
    applicable_tasks:
      - Plan document review
      - forge review with plan type
      - Implementation planning quality check
      - Task dependency and ordering validation
      - Pre-execution plan gate review
    keywords:
      - plan review
      - alignment
      - feasibility
      - acceptance criteria
      - task dependency
      - traceability
      - requirement coverage
      - risk mitigation
      - critical path
      - DocAdvisor
  plugins/forge/skills/review/docs/review_criteria_requirement.md:
    doc_type: rule
    title: Requirement Document Review Criteria
    purpose: Defines plugin-default review perspectives (completeness, consistency, verifiability) for requirement documents when project rules are absent; DocAdvisor may add project-specific perspectives.
    content_details:
      - Mandatory requirement coverage vs user stories and business goals; critical NFR categories missing entirely; exception and abnormal flows undefined
      - NFRs lacking quantified targets and measurement; undefined limits and concurrency; thin backup, monitoring, logging, and migration requirements
      - Conflicting requirements on the same feature or data; requirements misaligned with business goals or untraceable via traceability matrix
      - Inconsistent terminology for the same concept; weak cross-requirement references; priority ordering inconsistent with dependencies
