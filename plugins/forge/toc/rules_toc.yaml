  plugins/forge/docs/task_execution_spec.md:
    doc_type: rule
    title: Task Execution Guide (Executor Agent)
    purpose: "Defines self-contained workflow for the task-executor agent under start-implement: one task per run, mandatory full reading of orchestrator-supplied documents, implementation and verification per spec, and structured SUCCESS or FAILURE reporting."
    content_details:
      - "Single-task-per-run rule; forbidden: chaining tasks, editing plan YAML, launching subagents, or invoking skills and slash commands"
      - "Orchestrator-supplied payload: task ID, title, priority, implementation checklist, required-reading list, implementation instructions, verification requirements (build/test directives)"
      - "Five-step workflow: receive task, prepare (read documents in priority order and survey code with Grep/Glob/Read), implement, verify, report and exit without starting another task"
      - "Mandatory reading priority: design document, requirements, rules, then reference code; full-document read, not skimming"
      - "Implementation: execute checklist items; TDD when specified; report FAILURE if critical specification is absent from requirements because the executor cannot escalate to humans"
      - "Verification: apply only orchestrator-specified build/test rules; on failure analyze, fix, and retry once (two attempts maximum); otherwise report FAILURE"
      - "Report format: SUCCESS or FAILURE with task ID, implemented items, changed files, verification outcomes, and notes"
    applicable_tasks:
      - Implementing a single task from an implementation plan via start-implement
      - Authoring or updating task-executor agent instructions
      - Auditing executor versus orchestrator responsibilities for forge automation
    keywords:
      - task_execution_spec
      - task-executor
      - start-implement
      - verification requirements
      - FAILURE
      - required documents
      - Grep
      - plan yaml
  plugins/forge/docs/version_migration_spec.md:
    doc_type: rule
    title: Version Migration Implementation Specification
    purpose: "Defines implementation rules for staged versioned-data migration aligned with COMMON-REQ-001: chained pipeline, migration registry and apply loop, function contracts, error handling, version detection, new-version steps, and mandatory tests."
    content_details:
      - "Chained pipeline: each migration consumes the previous step output; skipping versions runs intermediate steps (e.g. v1 to v3 via v2)"
      - "Migration contract: fn(data)->data, idempotent, no I/O or side effects, mutate only on copied data"
      - "Error policy: return original data on failure; skip when detected_version >= CURRENT_VERSION; version detection failure treats data as v1"
      - MIGRATIONS registry keyed by target version; apply ascending keys where detected < v <= CURRENT_VERSION
      - Text migrations as fn(str)->str when YAML/JSON comments must be preserved
      - Self-describing version via YAML comment, YAML field, or JSON field; detect_version example defaults to oldest version
      - "Adding a version: implement migrate_N_to_N+1, register, bump CURRENT_VERSION without changing older migrators (open-closed)"
      - "Mandatory tests: single-hop, multi-hop, idempotency, rollback on error, future-version skip, detection-failure-as-v1"
    applicable_tasks:
      - Implementing versioned on-disk or in-memory format migration
      - Adding a new schema version step to an existing migration chain
      - Reviewing migration pipeline and rollback behavior
      - Writing migration unit tests per mandatory matrix
    keywords:
      - apply_migrations
      - MIGRATIONS
      - CURRENT_VERSION
      - detect_version
      - idempotent migration
      - staged migration
      - COMMON-REQ-001
      - migrate_doc_structure
