  plugins/forge/docs/plan_principles_spec.md:
    doc_type: rule
    title: Plan Creation Principles
    purpose: Defines plan document structure, task granularity rules, and guidelines for creating executable task lists from requirements and design specifications
    content_details:
      - Plan document YAML structure with four sections (requirements_traceability, design_traceability, tasks, revision_history)
      - Task granularity criteria (agent execution unit, 5-10 items per task, build success on completion, 1-3 related files)
      - Implementation detail restriction (reference design document sections without duplicating details)
      - Required reading file specification format (relative project paths only, no globs or ambiguous names)
      - Task grouping for multi-task dependencies with group_id and build_check fields
      - Dependency management (no circular dependencies, parallel execution identification)
    applicable_tasks:
      - Plan document creation
      - Task breakdown and definition
      - Dependency relationship review
      - Task priority determination
      - Build failure recovery planning
