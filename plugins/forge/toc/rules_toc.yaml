  plugins/forge/docs/plan_principles_spec.md:
    doc_type: rule
    title: Plan Document Authoring Principles
    purpose: Defines generic YAML plan structure, task granularity, required-reading paths, task grouping with build_check, dependencies, and parallel-task rules when no project-specific plan rules exist.
    content_details:
      - Plan YAML must contain only requirements_traceability, design_traceability, tasks, revision_history; no other top-level keys; file name pattern {feature}_plan.yaml
      - "Task scope: one agent run, 5–10 action items, green build/tests at completion, one file or 2–3 closely related files"
      - Task text references design sections by location only—no copied property names, types, or method signatures to avoid design/plan duplication
      - "Required-reading column: project-root-relative paths; no globs or ID-only refs; use '-' when none"
      - "Task groups: use group_id and build_check (per_task, skip, on_group_complete) when intermediate steps break the build; aim for at most ~10 tasks per group"
      - "Dependencies: order tasks by dependency, avoid cycles; dependency maps stay outside the plan body as working notes"
      - "Parallel tasks: depends_on: [] and group_id: null identify parallelizable work"
    applicable_tasks:
      - YAML implementation plan authoring
      - Plan structure and task-granularity review
      - Task grouping for phased builds
      - Preparing plans for start-implement workflows
    keywords:
