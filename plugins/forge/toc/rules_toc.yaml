  plugins/forge/docs/context_gathering_spec.md:
    doc_type: rule
    title: Context Gathering Specification
    purpose: "Defines self-contained work instructions for the forge context-gathering agent: orchestrator parameters, per-task procedures, session refs YAML outputs, and fallbacks."
    content_details:
      - Orchestrator passes session_dir, spec path, tasks list, and optional feature, skill_type, target_description as search hints
      - "Issue/Task confirmation: infer issue number from branch patterns (feature/N-xxx, fix/GH-N), gh issue view, read plan task when referenced"
      - "Spec discovery: query-specs skill, else resolve_doc_structure.py --type specs, else glob docs/specs/** and specs/**; write specs.yaml with source, query, documents"
      - "Rules discovery: query-rules, else resolve_doc_structure.py --type rules, else glob rules paths; write rules.yaml"
      - "Similar PR search: gh which/auth; gh pr list merged --search, pr view and diff --name-only; write prs.yaml or skip entire task if gh unavailable"
      - "Code exploration: Grep/Glob from keywords; classify files (same directory, importers, similar structure, tests); write code.yaml with optional line ranges"
      - "Zero results and errors: empty documents in YAML; fallbacks when DocAdvisor skills unavailable; skip PR task without gh; report unexpected errors to orchestrator and skip task"
    applicable_tasks:
      - Forge orchestrator context-gathering agent implementation
      - start-design and start-implement gathering pipeline maintenance
      - Session refs YAML output schema updates
