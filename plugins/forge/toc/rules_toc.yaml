  plugins/forge/docs/spec_design_boundary_spec.md:
    doc_type: rule
    title: Requirements and Design Document Boundary Guide
    purpose: Clarifies the boundary between requirements (What, user-facing, technology-neutral) and design (How, developer-facing, implementation-specific), with criteria and examples for placement decisions.
    content_details:
      - "Primary placement test: content suitable for a user manual goes to requirements; otherwise refine with further checks"
      - "Supplementary checks: stable under implementation changes, tech-specific terms, answers to how, class or method names"
      - Mermaid flowchart from user-manual question through tech-specific and stability branches to requirements vs design
      - Category matrices for data, state, processing, business rules, and tests marking requirements vs design columns
      - Good and bad examples for data flow, state management, and business rules including anti-patterns with API and class names in requirements
      - "Gray zone: primitive types like String or Int acceptable at conceptual requirements level; detailed type design belongs in design"
      - "Gray zone: user-facing navigation and use-case style diagrams in requirements; sequence, class, and internal data-flow diagrams in design"
      - "Closing guidance: requirements as user manual, design as implementation guide, human review when still ambiguous"
    applicable_tasks:
      - Authoring or restructuring requirements versus design documents
      - Reviewing specifications for What versus How boundary violations
      - Resolving ambiguous content placement during requirements or design work
    keywords:
      - requirements specification
      - design specification
      - What How boundary
      - user manual criterion
      - technology-neutral
      - ViewModel
      - data flow
      - ViewState
      - mermaid flowchart
