      - Open-Closed
  plugins/forge/skills/clean-rules/docs/taxonomy.md:
    doc_type: rule
    title: Development Document Taxonomy
    purpose: "Defines classification dimensions for clean-rules: six content types (Constraint through Reference), disambiguation priority, authority sources, scope, forge vs project responsibilities, and reconstruction principles."
    content_details:
      - "Six content types with roles: Constraint (MUST/MUST NOT, violations as bugs), Convention (SHOULD, team-changeable), Format (artifact templates), Process (step workflows), Decision (ADR-style rationale), Reference (catalogs and glossaries)"
      - "Section-type disambiguation priority: [MANDATORY] to Constraint; template structure to Format; procedures to Process; rationale to Decision; lists or catalogs to Reference; otherwise Convention"
      - "Authority sources: Tool-provided (forge built-in docs), Project-defined (team agreements), External standard (RFC, ISO, language specifications)"
      - "Scope: Universal (common to all forge-using projects) vs Project-specific (project name, domain, or proprietary technology)"
      - Forge vs project responsibility matrix by content type (what forge supplies vs what the project must define, e.g. review perspectives vs project security rules)
      - "Reconstruction principles: one file one concern by splitting mixed content types; expose forge knowledge in rules/ without tracking comments; preserve project-specific text when overlapping forge sections"
    applicable_tasks:
      - clean-rules skill execution and rule consolidation
      - Classifying and splitting rule documents by content type
      - Resolving duplicates using forge vs project ownership
      - Restructuring rules/ for single-concern files
    keywords:
      - taxonomy
      - clean-rules
      - Constraint
      - Convention
      - Format
      - Process
      - Decision
      - Reference
      - Tool-provided
      - Universal
  plugins/forge/skills/review/docs/review_criteria_code.md:
    doc_type: rule
    title: Code Review Criteria (Code)
    purpose: Defines plugin-default code review perspectives (logic, resilience, maintainability) with severity tiers and false-positive guidance; DocAdvisor can add project rules as extra perspectives.
    content_details:
      - "Logic perspective: logic bugs vs intent, data-loss risk without backup or transactions, mismatches with design docs (interfaces, flows, retries), unhandled null/empty/bounds/zero-division"
      - "Logic quality: unsafe casts and forced unwraps, races on shared state, swallowed errors; green-tier suggestions for assertions, edge-case tests, explicit types"
      - "Resilience fatal: injection and hardcoded secrets, missing authz on protected endpoints, resource leaks on exception paths without close or defer"
      - "Resilience quality: weak handling for I/O and APIs, insufficient input validation on external data, sparse error context in logs, missing client and DB timeouts; defensive validation, structured logging, retries"
      - "Maintainability fatal: constructors that instantiate concrete dependencies blocking mocks and tests"
      - "Maintainability quality: naming and style drift vs conventions, duplicated logic in three or more places, deep nesting and magic numbers, N+1 queries and per-iteration resource churn, missing unit tests for branching logic"
      - "False-positive rules: trust ORM or parameterized queries for SQL injection checks; tone down performance on small or rare workloads; do not attack naming when conventions are unspecified; confirm tests elsewhere before missing-test claims"
    applicable_tasks:
      - Forge /forge:review code execution
      - Reviewer agent perspective setup for code reviews
      - Default criteria when no project-specific review rules exist
    keywords:
      - review_criteria_code
      - logic
      - resilience
      - maintainability
      - perspective
      - injection
      - race condition
      - dependency injection
      - N+1 query
      - DocAdvisor
  plugins/forge/skills/review/docs/review_criteria_design.md:
    doc_type: rule
    title: Design Document Review Criteria
    purpose: Defines default forge review perspectives for design documents when project-specific rules are absent; DocAdvisor may add perspectives.
    content_details:
      - "Requirement-to-design alignment: missing requirement IDs, contradictory behavior (e.g. polling vs real-time) unless alternatives are explained in-doc"
      - "Data flow gaps: output/input type or format mismatches between components, missing transformations"
      - "External interface mismatches: API, protocol, or payload vs integration targets"
      - "Architecture violations: layer rule breaks in layered/Clean Architecture, circular A→B→C→A dependencies"
      - "Component cohesion: unrelated domains in one component vs intentional facade"
      - "Security: unencrypted sensitive paths, unintended auth bypass unless explicitly public"
      - "SPOF: single critical node without redundancy or failover when availability matters"
      - "Abnormal flows: missing retries, timeouts, fallbacks; weak transaction/concurrency boundaries"
      - "Observability: insufficient logging, metrics, or tracing for incident diagnosis"
      - "Improvements: ADRs, requirement-to-design traceability, documenting rejected alternatives"
    applicable_tasks:
      - Design document review (forge design type)
      - Requirements-to-design consistency verification
      - Architecture and dependency review
      - Security and resilience design review
      - Reviewer/evaluator perspective setup for design reviews
    keywords:
