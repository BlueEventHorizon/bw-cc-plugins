      - Clean Architecture
      - circular dependency
      - SPOF
      - observability
      - resilience
      - external interface
      - alignment
      - ADR
  plugins/forge/skills/review/docs/review_criteria_generic.md:
    doc_type: rule
    title: Generic Document Review Criteria
    purpose: Defines forge default generic-document review criteria when project-specific rules are absent; single-agent batch application without Perspective sections; DocAdvisor may append project perspectives when available.
    content_details:
      - "Fatal: verifiable factual errors (specs, versions, APIs, dates); stale-but-once-correct info treated as needs update not false fact"
      - "Fatal: contradictory statements within the same document"
      - "Fatal: broken links, missing paths, non-runnable commands; explicit TODO/future paths allowed"
      - "Fatal: missing information required for the document stated purpose"
      - "Quality: weak logical flow (section order, undefined jargon, abrupt conclusions)"
      - "Quality: mixed terms for one concept; first-use definition then shorthand counts as consistent"
      - "Quality: duplicated content increasing maintenance within or across related docs"
      - "Quality: verbosity and off-purpose bulk content"
      - "Improvement suggestions: clarity, structure, examples, diagrams"
    applicable_tasks:
      - forge generic-type document review
      - forge review skill criteria maintenance
      - Documentation QA when project rules index is unavailable
    keywords:
