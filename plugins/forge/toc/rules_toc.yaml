  plugins/forge/docs/design_principles_spec.md:
    doc_type: rule
    title: Design Document Authoring Principles
    purpose: "Defines generic principles for authoring design documents when project rules are absent: How vs What boundary, mandatory diagrams and tables, inclusion/exclusion lists, split criteria, file naming, Mermaid rules, and mandatory revision history."
    content_details:
      - Design documents cover How; What belongs in requirements; boundary details reference spec_design_boundary_spec.md
      - "Mandatory elements: module list table with responsibilities and dependencies, component or class diagram (Mermaid preferred), use case list table, sequence diagram (Mermaid preferred)"
      - Must include implementation approach with class and method names, tech stack with adoption rationale, flows and algorithms, data flow between components, normal and abnormal test case design, concrete paths to existing components
      - Must not include full source code except small 5–10 line examples, frameworks without rationale, or features not in requirements
      - Implementability criterion with SearchService.search() and 300ms debounce examples
      - "Hierarchical split for large specs: top-level architecture plus child module or screen docs; consider split above 500 lines; child metadata references parent design ID; top-level lists child documents"
      - File naming pattern {design_id}_{subject}_design.md, snake_case, English, _design.md suffix (e.g. DES-001_user_list_design.md)
      - Mermaid for flowchart, class, and sequence diagrams; lowercase end forbidden in flowcharts—use End or END
      - "Mandatory final section titled ## 改定履歴 with YYYY-MM-DD dates at document end"
      - "Anti-patterns: shallow asset search, ignoring constants and design tokens, skipping similar implementations, undocumented tech choices, large code dumps"
    applicable_tasks:
      - Design document authoring
      - Design document structure and completeness review
      - Splitting large design specs into hierarchical documents
      - Mermaid diagram authoring for design documentation
      - Distinguishing design (How) from requirements (What)
