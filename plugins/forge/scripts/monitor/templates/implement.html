<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>forge monitor — implement</title>
  <link rel="stylesheet" href="/assets/tokens.css" />
  <link rel="stylesheet" href="/assets/layout.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="topbar__title">forge implement</h1>
    <span class="topbar__subtitle" data-role="session-subtitle">session</span>
    <span class="topbar__spacer"></span>
    <span class="skill-tag" data-role="skill-tag">implement</span>
    <span class="sse-pulse" data-role="sse-pulse" data-state="connecting">connecting</span>
  </header>

  <main class="page">
    <div class="layout">
      <section data-role="main">
        <div class="card">
          <h2 class="card__title">tasks</h2>
          <div class="progress" data-role="progress"></div>
          <div data-role="tasks" style="margin-top: var(--space-4)">
            <p class="muted">読み込み中…</p>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="card">
          <h2 class="card__title">progress</h2>
          <div class="summary-grid" data-role="summary"></div>
        </div>
        <div class="card">
          <h2 class="card__title">session</h2>
          <div class="card__body" data-role="meta">—</div>
        </div>
      </aside>
    </div>
  </main>

  <script src="/assets/monitor.js"></script>
  <script>
  (function () {
    const STATUS_ORDER = [
      "pending", "in_progress", "completed", "skipped", "blocked",
    ];

    function getTasks(data) {
      const plan = (data.files && data.files["plan.yaml"]) || {};
      const content = plan.content;
      if (!content) return [];
      if (Array.isArray(content.tasks)) return content.tasks;
      if (Array.isArray(content.items)) return content.items;
      return [];
    }

    function countBy(tasks, key) {
      const counts = {};
      for (const t of tasks) {
        const v = String((t && t[key]) || "pending").toLowerCase();
        counts[v] = (counts[v] || 0) + 1;
      }
      return counts;
    }

    function renderSummary(tasks) {
      const mount = document.querySelector("[data-role=summary]");
      if (!mount) return;
      const counts = countBy(tasks, "status");
      const cells = [
        ["total", tasks.length],
        ["completed", counts.completed || counts.fixed || 0],
        ["in progress", counts.in_progress || 0],
        ["pending", counts.pending || 0],
      ];
      mount.innerHTML = cells.map(([label, n]) => `
        <div class="summary-stat">
          <div class="summary-stat__num">${n}</div>
          <div class="summary-stat__label">${Forge.escapeHtml(label)}</div>
        </div>
      `).join("");
    }

    function renderProgress(tasks) {
      const mount = document.querySelector("[data-role=progress]");
      if (!mount) return;
      if (!tasks.length) {
        mount.innerHTML = "";
        return;
      }
      const counts = countBy(tasks, "status");
      const total = tasks.length;
      const mapStatus = {
        completed: "fixed",
        fixed: "fixed",
        in_progress: "in_progress",
        skipped: "skipped",
        pending: "pending",
      };
      const segs = [];
      for (const s of STATUS_ORDER) {
        const n = counts[s] || 0;
        if (!n) continue;
        const cls = mapStatus[s] || "pending";
        const pct = (n / total) * 100;
        segs.push(
          `<div class="progress__seg progress__seg--${cls}"` +
          ` style="width: ${pct.toFixed(2)}%" title="${s}: ${n}"></div>`
        );
      }
      mount.innerHTML = segs.join("");
    }

    function formatDependencies(deps) {
      if (!Array.isArray(deps) || !deps.length) return "";
      return `<span class="mono dim">depends: ${deps.map(Forge.escapeHtml).join(", ")}</span>`;
    }

    function renderTasks(tasks) {
      const mount = document.querySelector("[data-role=tasks]");
      if (!mount) return;

      if (!tasks.length) {
        mount.innerHTML = `
          <div class="empty">
            <div class="empty__glyph">∅</div>
            <div>タスクはまだ定義されていません</div>
          </div>
        `;
        return;
      }

      // 優先度順(降順) + status でソート
      tasks.sort((a, b) => {
        const ap = Number(a.priority || 0);
        const bp = Number(b.priority || 0);
        if (ap !== bp) return bp - ap;
        return 0;
      });

      mount.innerHTML = tasks.map((t) => {
        const id = t.id || "";
        const title = t.title || t.name || "(no title)";
        const status = String(t.status || "pending").toLowerCase();
        const priority = t.priority != null ? String(t.priority) : "";
        const description = t.description || t.summary || "";
        const depends = formatDependencies(t.depends_on || t.dependencies);
        const files = Array.isArray(t.files) ? t.files : [];
        const execs = Array.isArray(t.executions) ? t.executions
          : Array.isArray(t.exec_history) ? t.exec_history
          : [];

        return `
          <article class="finding">
            <div class="finding__head">
              ${Forge.statusDot(status)}
              <span class="finding__title">${Forge.escapeHtml(String(title))}</span>
              <span class="finding__id">${Forge.escapeHtml(id)}</span>
              ${priority
                ? `<span class="badge">P${Forge.escapeHtml(priority)}</span>`
                : ""}
              <span class="badge">${Forge.escapeHtml(status)}</span>
            </div>
            ${description
              ? `<div class="finding__reason">${Forge.escapeHtml(description)}</div>`
              : ""}
            <div class="finding__meta">
              ${files.length
                ? `<span>files: ${files.map(Forge.escapeHtml).join(", ")}</span>`
                : ""}
              ${depends}
              ${execs.length
                ? `<span>exec × ${execs.length}</span>`
                : ""}
            </div>
          </article>
        `;
      }).join("");
    }

    function renderMeta(data) {
      const mount = document.querySelector("[data-role=meta]");
      if (!mount) return;
      const session = (data.files && data.files["session.yaml"] || {}).content || {};
      const rows = [];
      for (const k of ["feature", "mode", "skill", "current_task", "created_at"]) {
        if (session[k]) rows.push([k, session[k]]);
      }
      if (!rows.length) {
        mount.innerHTML = `<span class="muted">—</span>`;
        return;
      }
      mount.innerHTML = rows.map(([k, v]) => `
        <div style="display:flex; gap:var(--space-2); font-size:12px; margin-bottom:var(--space-1)">
          <span class="muted mono" style="min-width:82px">${Forge.escapeHtml(k)}</span>
          <span class="mono">${Forge.escapeHtml(String(v))}</span>
        </div>
      `).join("");
    }

    Forge.render = function (data) {
      const tasks = getTasks(data);
      renderSummary(tasks);
      renderProgress(tasks);
      renderTasks(tasks);
      renderMeta(data);
    };
  })();
  </script>
</body>
</html>
