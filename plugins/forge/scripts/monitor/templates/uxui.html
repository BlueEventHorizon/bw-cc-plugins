<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>forge monitor — uxui</title>
  <link rel="stylesheet" href="/assets/tokens.css" />
  <link rel="stylesheet" href="/assets/layout.css" />
  <style>
    .ascii-view {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.35;
      white-space: pre;
      overflow-x: auto;
      background: var(--bg-subtle);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .token-row {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-2) 0;
      border-bottom: 1px dashed var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .token-row:last-child { border-bottom: none; }
    .token-swatch {
      width: 18px;
      height: 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
    }
    .token-name { color: var(--text); }
    .token-value { color: var(--text-muted); }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 class="topbar__title">forge uxui</h1>
    <span class="topbar__subtitle" data-role="session-subtitle">session</span>
    <span class="topbar__spacer"></span>
    <span class="skill-tag" data-role="skill-tag">uxui</span>
    <span class="sse-pulse" data-role="sse-pulse" data-state="connecting">connecting</span>
  </header>

  <main class="page">
    <div class="layout">
      <section data-role="main">
        <div class="card">
          <h2 class="card__title">ASCII layout</h2>
          <div data-role="ascii">
            <p class="muted">読み込み中…</p>
          </div>
        </div>
        <div class="card">
          <h2 class="card__title">components</h2>
          <div data-role="components">
            <p class="muted">—</p>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="card">
          <h2 class="card__title">tokens</h2>
          <div data-role="tokens">
            <p class="muted">—</p>
          </div>
        </div>
        <div class="card">
          <h2 class="card__title">session</h2>
          <div class="card__body" data-role="meta">—</div>
        </div>
      </aside>
    </div>
  </main>

  <script src="/assets/monitor.js"></script>
  <script>
  (function () {
    function extractAscii(content) {
      if (!content) return "";
      const matches = [];
      const fence = /```(?:ascii|txt|text)?\s*\n([\s\S]*?)```/g;
      let m;
      while ((m = fence.exec(content)) !== null) {
        if (m[1].includes("│") || m[1].includes("┌") || m[1].includes("─")
            || m[1].includes("+---") || m[1].includes("| ")) {
          matches.push(m[1]);
        }
      }
      return matches.join("\n\n");
    }

    function renderAscii(data) {
      const mount = document.querySelector("[data-role=ascii]");
      if (!mount) return;

      const files = data.files || {};
      const src = (files["design.md"] && files["design.md"].content)
        || (files["requirements.md"] && files["requirements.md"].content)
        || "";
      const ascii = extractAscii(src);

      if (!ascii) {
        mount.innerHTML = `
          <div class="empty">
            <div class="empty__glyph">∅</div>
            <div>ASCII レイアウトが見つかりません</div>
          </div>
        `;
        return;
      }
      mount.innerHTML = `<div class="ascii-view">${Forge.escapeHtml(ascii)}</div>`;
    }

    function renderTokens(data) {
      const mount = document.querySelector("[data-role=tokens]");
      if (!mount) return;

      const files = data.files || {};
      // design.md 内の ``` css ... ``` ブロックから --var: value を抽出
      const src = (files["design.md"] && files["design.md"].content) || "";
      const cssBlocks = [];
      const re = /```(?:css|scss)?\s*\n([\s\S]*?)```/g;
      let m;
      while ((m = re.exec(src)) !== null) {
        if (/--[a-zA-Z0-9-]+\s*:/.test(m[1])) cssBlocks.push(m[1]);
      }
      const joined = cssBlocks.join("\n");
      const tokens = [];
      const tre = /--([a-zA-Z0-9-]+)\s*:\s*([^;]+);/g;
      while ((m = tre.exec(joined)) !== null) {
        tokens.push({ name: m[1], value: m[2].trim() });
      }

      if (!tokens.length) {
        mount.innerHTML = `<span class="muted">—</span>`;
        return;
      }

      mount.innerHTML = tokens.slice(0, 30).map((t) => {
        const isColor = /^#|rgb|hsl/.test(t.value);
        const swatch = isColor
          ? `<span class="token-swatch" style="background:${t.value}"></span>`
          : `<span></span>`;
        return `
          <div class="token-row">
            ${swatch}
            <span class="token-name">--${Forge.escapeHtml(t.name)}</span>
            <span class="token-value">${Forge.escapeHtml(t.value)}</span>
          </div>
        `;
      }).join("") + (tokens.length > 30
        ? `<div class="dim" style="font-size:11px; margin-top:var(--space-2)">+ ${tokens.length - 30} more</div>`
        : "");
    }

    function renderComponents(data) {
      const mount = document.querySelector("[data-role=components]");
      if (!mount) return;
      const files = data.files || {};
      const src = (files["design.md"] && files["design.md"].content) || "";

      // ## Component: Name のような見出しを抽出
      const items = [];
      const re = /^#{2,3}\s*(?:Component\s*[:：]?\s*)?(.+)$/gm;
      let m;
      while ((m = re.exec(src)) !== null && items.length < 20) {
        const title = m[1].trim();
        if (!title) continue;
        items.push(title);
      }

      if (!items.length) {
        mount.innerHTML = `<span class="muted">—</span>`;
        return;
      }
      mount.innerHTML = items.map((it) => `
        <div style="display:flex; gap:var(--space-3); align-items:center; padding:var(--space-2) 0; border-bottom:1px dashed var(--border)">
          <span class="badge">${Forge.escapeHtml(it)}</span>
        </div>
      `).join("");
    }

    function renderMeta(data) {
      const mount = document.querySelector("[data-role=meta]");
      if (!mount) return;
      const session = (data.files && data.files["session.yaml"] || {}).content || {};
      const rows = [];
      for (const k of ["feature", "mode", "skill", "created_at"]) {
        if (session[k]) rows.push([k, session[k]]);
      }
      if (!rows.length) {
        mount.innerHTML = `<span class="muted">—</span>`;
        return;
      }
      mount.innerHTML = rows.map(([k, v]) => `
        <div style="display:flex; gap:var(--space-2); font-size:12px; margin-bottom:var(--space-1)">
          <span class="muted mono" style="min-width:72px">${Forge.escapeHtml(k)}</span>
          <span class="mono">${Forge.escapeHtml(String(v))}</span>
        </div>
      `).join("");
    }

    Forge.render = function (data) {
      renderAscii(data);
      renderTokens(data);
      renderComponents(data);
      renderMeta(data);
    };
  })();
  </script>
</body>
</html>
