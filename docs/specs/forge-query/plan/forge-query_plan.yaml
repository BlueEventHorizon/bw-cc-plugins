# === タスク一覧 ===
tasks:
  # ---------- フェーズ 1: 共通基盤 ----------

  - task_id: TASK-001
    title: select_backend.py を新規実装
    priority: 95
    status: pending
    design_id: DES-001
    depends_on: []
    group_id: "GROUP-001 (1/2)"
    build_check: skip
    description:
      - plugins/forge/scripts/backend_selection/select_backend.py を新規作成
      - 引数: --available <skill_list> / --category {rules|specs} / --operation {query|update}
      - DES-001 §1.5.1 API キー判定（OPENAI_API_DOCDB_KEY / OPENAI_API_KEY のフォールバック、空文字列は未設定扱い）
      - DES-001 §2.3 分岐テーブル A（採用バックエンド決定 5 行）を網羅評価
      - DES-001 §2.3 分岐テーブル B（バックエンド × category × operation → skill 名 8 行）を網羅評価
      - stdout に JSON {backend, skill, error} を出力。error は §5.1 のエラーメッセージ全文と完全一致
      - Python 標準ライブラリのみ。read-only（ファイル書込・外部プロセス起動・git 操作なし）
    acceptance_criteria: |
      `python3 plugins/forge/scripts/backend_selection/select_backend.py --available doc-db,doc-advisor --category rules --operation query` が
      環境変数の状態に応じて分岐テーブル A/B 通りの JSON を stdout に返し、ファイル書込が発生しない。
    required_reading:
      - docs/specs/forge-query/design/DES-001_forge-query_abstraction_design.md
      - docs/rules/implementation_guidelines.md

  - task_id: TASK-002
    title: select_backend.py のユニットテスト追加
    priority: 95
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-001
    group_id: "GROUP-001 (2/2)"
    build_check: on_group_complete
    description:
      - tests/forge/scripts/test_backend_selection.py を新規追加
      - 分岐テーブル A 5 行をゴールデン網羅
      - 分岐テーブル B 8 行（backend × category × operation → skill）を網羅
      - API キー判定の正常/異常パスを網羅（DOCDB のみ / KEY のみ / 両方未設定 / 両方空文字列 / 片方空・片方有効）
      - バックエンド不在時の error 文字列が DES-001 §5.1 と完全一致することを文字列等価で検証
      - read-only 性を tmp ディレクトリ + checksum で確認
      - "`python3 -m unittest tests.forge.scripts.test_backend_selection -v` 全合格"
    acceptance_criteria: |
      分岐テーブル A 5 行 + B 8 行 + API キー判定パス + §5.1 エラー文字列完全一致 + read-only 性の全テストが合格する。
    required_reading:
      - docs/specs/forge-query/design/DES-001_forge-query_abstraction_design.md

  # ---------- フェーズ 2: 4 SKILL 作成 ----------

  - task_id: TASK-003
    title: "/forge:query-db-rules SKILL.md を新設"
    priority: 80
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-001
    group_id: "GROUP-002 (1/4)"
    build_check: skip
    description:
      - plugins/forge/skills/query-db-rules/SKILL.md を新設
      - 雛形は plugins/forge/skills/query-forge-rules/SKILL.md（継承型）の構造を流用
      - "argument-hint: \"task description\"（--toc / --index は受理しない / ADR-001）"
      - 内部フロー: available-skills を LLM が読む → Bash で select_backend.py --category rules --operation query 呼出 → JSON から Skill ツールで該当バックエンド起動
      - 分岐テーブルを SKILL.md に複製しない（SoT は select_backend.py のみ）
      - Role 章に read-only [MANDATORY] / バックエンド検索 SKILL 以外の Skill 起動禁止 / 自己再帰禁止を明記（ADR-002 §B / DES-001 §3.1）
      - 引数解釈 [MANDATORY] セクション（ADR-002 §C）
      - "DES-001 §5.3 に従い、doc-advisor 採用時の応答中の旧スキル名（/doc-advisor:create-rules-toc 等）を /forge:update-db-rules に置換してから親に返す責務を出力後処理章で明示"
      - バージョン関連ファイル（plugin.json の version 行 / marketplace.json / CHANGELOG.md）は触らない
    acceptance_criteria: |
      SKILL.md が継承型 frontmatter（context: fork なし）+ B/C 層多重防御契約 + Required documents 出力契約を満たし、
      Bash と Skill 以外の書き込み系ツールが allowed-tools に含まれない。
      doc-advisor 応答中の旧スキル名を /forge:update-db-rules に置換する責務（DES-001 §5.3）が SKILL.md 本文に記載されている。
    required_reading:
      - docs/specs/forge-query/design/DES-001_forge-query_abstraction_design.md
      - docs/specs/forge-query/design/ADR-001_forge_query_test_flag_policy.md
      - docs/rules/skill_authoring_notes.md
      - docs/rules/document_writing_rules.md

  - task_id: TASK-004
    title: "/forge:query-db-specs SKILL.md を新設"
    priority: 80
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-001
    group_id: "GROUP-002 (2/4)"
    build_check: skip
    description:
      - plugins/forge/skills/query-db-specs/SKILL.md を新設
      - 構造は TASK-003 と同一で検索対象を specs に切り替える
      - select_backend.py への呼出パラメータは --category specs --operation query
      - B/C 層多重防御契約と引数解釈 [MANDATORY] セクションは TASK-003 と同じ
      - ADR-001 に従い --toc / --index を SKILL.md 本文に書かない
      - "DES-001 §5.3 に従い、doc-advisor 採用時の応答中の旧スキル名（/doc-advisor:create-specs-toc 等）を /forge:update-db-specs に置換してから親に返す責務を出力後処理章で明示"
    acceptance_criteria: |
      SKILL.md が継承型 frontmatter + B/C 層制約 + Required documents 出力契約を満たし、
      query-db-rules と検索対象（rules / specs）のみが差分となる。
      doc-advisor 応答中の旧スキル名を /forge:update-db-specs に置換する責務（DES-001 §5.3）が SKILL.md 本文に記載されている。
    required_reading:
      - docs/specs/forge-query/design/DES-001_forge-query_abstraction_design.md
      - docs/specs/forge-query/design/ADR-001_forge_query_test_flag_policy.md
      - docs/rules/skill_authoring_notes.md

  - task_id: TASK-005
    title: "/forge:update-db-rules SKILL.md を新設"
    priority: 75
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-001
    group_id: "GROUP-002 (3/4)"
    build_check: skip
    description:
      - plugins/forge/skills/update-db-rules/SKILL.md を新設
