    priority: 75
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-001
    group_id: "GROUP-002 (4/4)"
    build_check: on_group_complete
    description:
      - plugins/forge/skills/update-db-specs/SKILL.md を新設
      - 構造は TASK-005 と同一で対象を specs に切り替える
