      - バージョン関連ファイル（version 行 / marketplace.json / CHANGELOG.md）に diff を出さない
    acceptance_criteria: |
      旧呼び出しの残存 grep が説明文中の言及のみとなる（受入条件 #5）。
      query 系のガードが削除され、update 系のガードが維持される。
      ガイド文書が抽象 SKILL 経由の導線で統一される。
      `python3 -m unittest discover -s tests -p 'test_*.py' -v` 全合格 + `dprint check` 通過。
