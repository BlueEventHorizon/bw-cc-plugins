  # ---------- フェーズ 4: 既存呼び出し置換 ----------

  - task_id: TASK-008
    title: "既存 forge skills の /doc-advisor:* 直呼びを /forge:*-db-* に置換 + ガイド文書統一"
    priority: 60
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-007
    group_id: null
    build_check: per_task
    description:
      - "DES-001 §4.1 マッピングで置換: /doc-advisor:query-rules → /forge:query-db-rules、/doc-advisor:query-specs → /forge:query-db-specs、/doc-advisor:create-rules-toc → /forge:update-db-rules、/doc-advisor:create-specs-toc → /forge:update-db-specs"
      - 対象範囲は plugins/forge/skills/*/SKILL.md + plugins/forge/skills/*/docs/*.md + plugins/forge/skills/review/docs/review_criteria_*.md + .claude/skills/ + .agents/skills/
      - "DES-001 §3.1 [MANDATORY] に従い、Skill ツール経由で /forge:query-db-* を呼ぶ箇所の args を **検索語 + 短文タスク記述のみ** に正規化（Issue 本文 / 実装指示 / diff / 親 context は貼らない）"
      - "残存 grep: `grep -rn -E 'query-rules|query-specs|create-rules-toc|create-specs-toc' plugins/forge/skills/ .claude/skills/ .agents/skills/` でヒットが説明文中の言及（再帰防止注記 / 設計書引用）のみになることを確認"
      - DES-001 §8.2 に従い query 系の「利用可能ならスキップ」ガードを削除（検索結果が必須）、update 系のガードは維持
      - merge-feature-specs の Phase 0「doc-advisor 必須」検査を「抽象 skill 必須」検査に置換（DES-001 §4.2 末尾）
      - "ガイド文書（CLAUDE.md / README.md / README_en.md / docs/readme/forge/guide_*.md / docs/readme/guide_doc-advisor_ja.md）の呼び方を抽象 SKILL に統一"
