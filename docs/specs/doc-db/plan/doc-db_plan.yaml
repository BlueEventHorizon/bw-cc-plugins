      - "実行時に CLAUDE_PROJECT_DIR=$TMP を明示して project_root を $TMP に固定（toc_utils が cwd より優先するため）"
      - "評価終了後に $TMP をディレクトリごと削除"
      - "doc-advisor 本体（plugins/doc-advisor/ と .claude/doc-advisor/）が一切変更されないことを assert（AC-01）"
