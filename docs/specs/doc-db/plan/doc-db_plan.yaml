    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-007_doc_db_evaluation_spec.md
      - docs/specs/doc-db/requirements/NFR-004_doc_db_search_quality_spec.md

  - task_id: TASK-012
    title: AC-01 を保つ評価用一時 Index 生成手順の実装
    priority: 65
    status: pending
    design_id: DES-026
    depends_on:
      - TASK-011
    group_id: "GROUP-006 (2/3)"
    build_check: skip
    description:
      - "DES-026 §6.7 の手順をシェル / Python で自動化（meta/test_docs/_tmp_3large/ 配下）"
      - "doc-advisor 依存モジュールを $TMP/scripts/ にコピー、コピー版の embedding_api.py で EMBEDDING_MODEL を text-embedding-3-large に変更"
