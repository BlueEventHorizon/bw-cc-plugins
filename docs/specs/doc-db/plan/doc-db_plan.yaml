      - docs/specs/doc-db/requirements/FNC-007_doc_db_evaluation_spec.md

  # ---------------------------------------------------------------
  # 統合テスト + 配布
  # ---------------------------------------------------------------
  - task_id: TASK-014
    title: 統合テスト 3 シナリオの実装
    priority: 70
    status: pending
    design_id: DES-026
    depends_on:
      - TASK-010
