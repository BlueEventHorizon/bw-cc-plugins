# === タスク一覧 ===
tasks:
  # ---------------------------------------------------------------
  # P1: 共通基盤（_utils + doc_structure + embedding_api）
  # ---------------------------------------------------------------
  - task_id: TASK-001
    title: 共通基盤モジュール一式（_utils / doc_structure / embedding_api）の配置
    priority: 95
    status: completed
    design_id: DES-026
    depends_on: []
    group_id: "GROUP-001 (1/1)"
    build_check: per_task
    description:
      - "plugins/doc-db/ 配下の plugin スケルトン（plugin.json / scripts/ / skills/）を作成する"
      - "_utils.py を新規作成し DES-026 §3.1 の責務（checksum / hash / glob / NFC 正規化 / log）を実装"
      - "doc_structure.py を plugins/forge/skills/doc-structure/scripts/resolve_doc_structure.py からコピーし plugins/doc-db/scripts/ 配下に配置（forge 本体を runtime 参照しない・AC-01 / NFR-005 整合）"
      - "embedding_api.py を plugins/doc-advisor/scripts/embedding_api.py からコピーし EMBEDDING_MODEL を text-embedding-3-large に差し替える（DES-026 §6.7）"
      - "tests/doc_db/test_utils.py を作成し checksum 計算の安定性・glob 解決・NFC 正規化を検証"
      - "tests/doc_db/test_doc_structure.py で doc_types_map 解決の基本ケースを検証"
      - "コピー方針の根拠と AC-01 境界をモジュール冒頭の docstring に記載"
    acceptance_criteria: |
      python3 -m unittest discover -s tests/doc_db -p 'test_*.py' が成功し、
      plugins/forge / plugins/doc-advisor のファイルが一切変更されていないこと。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/REQ-006_doc_db.md
      - docs/specs/doc-db/requirements/NFR-005_doc_db_zero_dependency_spec.md
      - docs/rules/implementation_guidelines.md

  # ---------------------------------------------------------------
  # P2: chunk_extractor + build_index 骨格 + Index フォーマット
  # ---------------------------------------------------------------
  - task_id: TASK-002
    title: chunk_extractor.py 実装（見出し境界 chunk 抽出）
    priority: 90
    status: completed
    design_id: DES-026
    depends_on:
      - TASK-001
    group_id: "GROUP-002 (1/2)"
    build_check: skip
    description:
      - "DES-026 §3.1 / §6.1 / §6.2 に従い chunk_extractor.py を新規実装する"
      - "Markdown を H1〜H6 の見出し境界で分割し chunk_id・heading_path・char_range・本文を生成"
      - "見出しなし文書は文書全体を 1 chunk として扱う（FNC-005 CHK-02）"
      - "1 chunk が token 上限 8192 を超える場合は段落境界で再分割（DES-026 §6.2）"
      - "chunk_id は file_path + heading_path の SHA-256 先頭 8 文字、衝突時は連番サフィックス"
      - "tests/doc_db/test_chunk_extractor.py で見出し階層保持・char_range の正確性・上限超過時の再分割を検証"
    acceptance_criteria: |
      tests/doc_db/test_chunk_extractor.py が成功し、設計書 §6.1 / §6.2 の境界条件
      （見出しなし・上限超過・H1〜H6）すべてのテストケースが通ること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-005_doc_db_index_build_spec.md

  - task_id: TASK-003
    title: build_index.py コピー → chunk 単位 Index 拡張
    priority: 90
    status: completed
    design_id: DES-026
    depends_on:
      - TASK-001
      - TASK-002
    group_id: "GROUP-002 (2/2)"
    build_check: on_group_complete
    description:
      - "plugins/doc-advisor/scripts/embed_docs.py を plugins/doc-db/scripts/build_index.py としてコピー"
      - "Index フォーマットを DES-026 §4.1 の chunk 単位スキーマに変更（metadata / chunks 配列）"
      - "chunk_extractor を呼び出して file → chunks 展開、各 chunk を batch Embedding"
      - "失敗 chunk は metadata.failed_chunks に構造化記録（chunk_id / path / error_type / attempts / last_failed_at）し build_state=incomplete として保存（DES-026 §4.1）"
      - "差分更新（新規 / 変更 / 削除 / リネーム）を doc-advisor から継承した checksum 比較で実装"
      - "tests/doc_db/test_build_index.py で差分更新・incomplete 記録・schema mismatch 時の保護を検証"
    acceptance_criteria: |
      tests/doc_db/ の全テストが成功し、build-index 単独で chunk 単位 Index が
      生成され build_state / failed_chunks の構造が DES-026 §4.1 と一致すること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-005_doc_db_index_build_spec.md

  # ---------------------------------------------------------------
  # P3: lexical_search + hybrid_score + search_index 骨格
  # ---------------------------------------------------------------
  - task_id: TASK-004
    title: lexical_search.py 実装（語彙一致 + ID パターン高スコア化）
    priority: 80
    status: completed
    design_id: DES-026
    depends_on:
      - TASK-001
    group_id: "GROUP-003 (1/3)"
    build_check: skip
    description:
      - "plugins/doc-advisor/scripts/grep_docs.py をコピーし lexical_search.py に改名"
      - "DES-026 §6.4 の単語分割（空白 + 記号分割）を実装"
      - "ID パターン `[A-Z]+-\\d+` の完全一致を高スコア化"
      - "大文字小文字・全角半角の正規化を適用（FNC-006 LEX-01）"
      - "tests/doc_db/test_lexical_search.py で ID 高スコア化・正規化・完全一致を検証"
    acceptance_criteria: |
      ID 検索（例: `FNC-006`）が自然文検索より高スコアになり、
      正規化テストが全て通ること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-006_doc_db_search_spec.md

  - task_id: TASK-005
    title: hybrid_score.py 実装（RRF + 線形加重統合）
    priority: 80
    status: completed
    design_id: DES-026
    depends_on:
      - TASK-001
    group_id: "GROUP-003 (2/3)"
    build_check: skip
    description:
      - "DES-026 §6.5 に従い hybrid_score.py を新規実装"
      - "Reciprocal Rank Fusion（RRF, k=60）を初期実装として提供"
      - "設定で α 加重統合（α * emb + (1-α) * lex）に切替可能とする"
      - "tests/doc_db/test_hybrid_score.py で RRF の決定論性・α=0/α=1 の境界値・空入力を検証"
    acceptance_criteria: |
      RRF / 線形加重ともに同一入力で安定したランキングを返し、
      α=0 で lex のみ・α=1 で emb のみとなること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-006_doc_db_search_spec.md

  - task_id: TASK-006
    title: search_index.py コピー → Embedding + Lexical + Hybrid 統合
    priority: 85
    status: completed
    design_id: DES-026
    depends_on:
      - TASK-003
      - TASK-004
      - TASK-005
    group_id: "GROUP-003 (3/3)"
    build_check: on_group_complete
    description:
      - "plugins/doc-advisor/scripts/search_docs.py をコピーし search_index.py に改名"
      - "Index ロード → Embedding 検索（cosine）と Lexical 検索を並列実行 → Hybrid 統合の検索パイプラインを実装"
      - "mode={emb, lex, hybrid} の 3 モードを動作させる（rerank は次タスク）"
      - "起動時に Index ↔ checksums の generated_at 突き合わせを行い不整合時はエラー終了で --full 案内（DES-026 §5.2 / §5.3）"
      - "Index 鮮度確認 → 不一致時の差分自動再生成（FNC-006 §2 doc-advisor 継承機能）"
      - "tests/doc_db/test_search_index.py で各 mode の出力フォーマット・鮮度確認・自動再生成・整合性チェックを検証"
    acceptance_criteria: |
      mode=emb / lex / hybrid いずれでも検索結果が返り、起動時整合性チェックで
      generated_at 不一致を検出すると exit code 2 で --full を案内すること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-006_doc_db_search_spec.md

  # ---------------------------------------------------------------
  # P4: LLM Rerank
  # ---------------------------------------------------------------
  - task_id: TASK-007
    title: llm_rerank.py 実装と search_index への統合
    priority: 75
    status: pending
    design_id: DES-026
    depends_on:
      - TASK-006
    group_id: null
    build_check: per_task
    description:
      - "DES-026 §6.6 に従い llm_rerank.py を新規実装（採用モデル: gpt-4o-mini）"
      - "preview = heading_path + 本文先頭 200 token に切り詰めて prompt を構築"
      - "token budget 動的制御（context 128K の 70% を入力上限）で候補数を 5〜30 の範囲で動的決定"
      - "API 失敗時は統合スコア順を fallback として返し、結果に fallback_used / rerank_error を含める（FNC-006 RR-02）"
      - "search_index.py に mode=rerank を統合し検索結果スキーマに api_calls / token_usage を追加（DES-026 §5.3）"
      - "tests/doc_db/test_llm_rerank.py で fallback 動作・preview 切り詰め・token budget 縮小を検証"
    acceptance_criteria: |
      mode=rerank で API 成功時はランキングが変動、API 失敗時は fallback_used=true で
      統合スコア順が返ること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-006_doc_db_search_spec.md

  # ---------------------------------------------------------------
  # P5: doc_type 単位 Index 分離 + 入力バリデーション + SKILL レイヤー
  # ---------------------------------------------------------------
  - task_id: TASK-008
    title: doc_type 単位 Index 分離と二相整合性プロトコル実装
    priority: 80
    status: pending
    design_id: DES-026
    depends_on:
      - TASK-003
    group_id: "GROUP-005 (1/3)"
    build_check: skip
    description:
      - "DES-026 §3.1 / §4.4 / §5.2 に従い specs Index を doc_type 単位（requirement / design / plan）に分離"
      - "Index 配置を `.claude/doc-db/index/{rules|specs}/{<doc_type>_index|rules_index}.json` に変更"
      - "checksums.yaml も doc_type 単位に分離"
      - "二相書き込みプロトコルを build_index.py に実装（tmp 両方生成 → fsync → os.replace を Index→checksums の順）"
      - "metadata と checksums.yaml に同一 generated_at を埋め込む"
      - "tests/doc_db/test_build_index.py に doc_type 分離・二相書き込み失敗時の旧状態保持テストを追加"
    acceptance_criteria: |
      specs build で doc_type 単位の Index が生成され、書き込み中の擬似失敗
      （tmp 削除）で旧 Index / 旧 checksums が保持されること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-005_doc_db_index_build_spec.md

  - task_id: TASK-009
    title: 入力バリデーションと検索結果観測フィールドの確定
    priority: 75
    status: pending
    design_id: DES-026
    depends_on:
      - TASK-007
      - TASK-008
    group_id: "GROUP-005 (2/3)"
    build_check: skip
    description:
      - "search_index.py / build_index.py の引数パーサに DES-026 §3.2 のバリデーション規則を実装"
      - "違反時は stderr に {\"error\": ..., \"hint\": ...} を JSON で返し exit 2"
      - "specs 検索で --doc-type 未指定時のデフォルト requirement,design を実装（FNC-006 OP-04）"
      - "検索結果スキーマに fallback_used / rerank_error / api_calls / token_usage / build_state / incomplete_count を含める"
      - "stderr 構造化ログ（event_type 付き 1 行 JSON）を fallback / incomplete / validation_error について出力"
      - "tests/doc_db/test_search_index.py / test_build_index.py に境界値・許容集合違反・デフォルト doc_type のテストを追加"
    acceptance_criteria: |
      --query 0 文字 / --top-n 0 等のすべての違反ケースで exit code 2 が返り、
      正常検索時の結果 JSON に観測フィールドが揃うこと。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/specs/doc-db/requirements/FNC-006_doc_db_search_spec.md
      - docs/specs/doc-db/requirements/NFR-004_doc_db_search_quality_spec.md

  - task_id: TASK-010
    title: SKILL レイヤー実装（/doc-db:build-index と /doc-db:query）
    priority: 70
    status: pending
    design_id: DES-026
    depends_on:
      - TASK-009
    group_id: "GROUP-005 (3/3)"
    build_check: on_group_complete
    description:
      - "plugins/doc-db/skills/build-index/SKILL.md を作成し build_index.py の薄いラッパーとする"
      - "plugins/doc-db/skills/query/SKILL.md を作成し search_index.py の薄いラッパーとする"
      - "frontmatter は doc-advisor の SKILL を参考に user-invocable / disable-model-invocation を設定"
      - "SKILL は ${CLAUDE_PLUGIN_ROOT}/scripts/ のスクリプト呼び出しに留め、ロジックを書かない"
      - "両 SKILL の手動実行で rules / specs の Index 生成 → 検索が通ることを確認"
    acceptance_criteria: |
      /doc-db:build-index --category rules / /doc-db:query --category specs --query "..."
      の手動実行が成功し、結果スキーマが §5.3 と一致すること。
    required_reading:
      - docs/specs/doc-db/design/DES-026_doc_db_design.md
      - docs/rules/skill_authoring_notes.md

  # ---------------------------------------------------------------
  # P6: 評価機能（FNC-007）
  # ---------------------------------------------------------------
  - task_id: TASK-011
    title: evaluate.py ランナー実装（doc-db / ToC / doc-advisor 並列実行）
    priority: 65
    status: pending
    design_id: DES-026
    depends_on:
      - TASK-010
    group_id: "GROUP-006 (1/3)"
    build_check: skip
    description:
      - "DES-026 §3.1 / §5.4 に従い evaluate.py を新規実装"
      - "ゴールデンセット（meta/test_docs/）を読み込み doc-db / ToC / doc-advisor の検索を順に実行"
      - "recall / precision / false negative 数（MET-01）と検索時間（MET-02）と API コール数・token 数（MET-03）を集計"
      - "false negative の傾向分類（ID 検索失敗 / 長文希釈 / 自然文意味ズレ 等）を実装（FNC-007 REP-02）"
