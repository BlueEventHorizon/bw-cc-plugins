# doc-db-first 実装計画書
#
# 親要件: FNC-008（doc-advisor 検索エンジン昇格 - doc-db first）
# 設計: DES-028（v2.0）
# 配布形態: plugins/doc-advisor / plugins/doc-db（既存 plugin への修正、新規 plugin なし）
# 依存制約: Python 標準ライブラリのみ（既存 doc-advisor / doc-db の方針を継承）
#
# 方針補足 (FNC-008 v1.4 / DES-028 v2.0 整合):
#  - doc-advisor の Embedding 関連スクリプト・--index モード・関連テストは「保持」
#  - 本 feature の変更スコープ:
#    (1) mode=auto を doc-db Hybrid 検索へ切替
#    (2) doc-advisor 側 Embedding 関連スクリプトの API KEY 参照を doc-db と統一
#    (3) query-specs / query-rules SKILL.md の description / argument-hint / mode=auto 更新
#  - forge:clean-rules SKILL の無効化は本 feature では行わない（独立 issue）

