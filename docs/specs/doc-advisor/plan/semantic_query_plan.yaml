# === タスク一覧 ===

tasks:

  - task_id: TASK-001
    title: toc_utils.py に load_metadata() と get_all_md_files() を追加
    priority: 95
    status: completed
    design_id: DES-006
    depends_on: []
    group_id: "phase-1-foundation"
    build_check: per_task
    description:
      - toc_utils.py に get_all_md_files(common_config) を追加（DES-006 §5 参照）
      - create_pending_yaml.py の get_all_md_files() をラッパーとして維持（回帰防止）
      - toc_utils.py に load_metadata(category, file_path, project_root) を追加（DES-006 §3.3 参照）
      - ToC YAML 存在時はエントリから取得、非存在時はフォールバック dict を返す
      - 既存テスト tests/doc_advisor/scripts/test_toc_utils.py が全件パスすることを確認
    acceptance_criteria: |
      toc_utils.get_all_md_files(common_config) と load_metadata() が追加され、
      既存テストが全てパスする
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - plugins/doc-advisor/scripts/toc_utils.py
      - plugins/doc-advisor/scripts/create_pending_yaml.py
      - tests/doc_advisor/scripts/test_toc_utils.py

  - task_id: TASK-002
    title: embed_docs.py — Embedding インデックス構築スクリプト実装
    priority: 90
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-001
    group_id: "phase-2-scripts"
    build_check: per_task
    description:
      - CLI の実装（--category, --full, --check オプション）（DES-006 §3.3 参照）
      - init_common_config() → get_all_md_files() → 差分検出 → load_metadata() の処理フロー
      - build_embedding_text() によるメタデータ → Embedding テキスト変換
      - OpenAI Embedding API バッチ呼び出し（urllib.request, バッチ上限 100）
      - {category}_index.json への保存（DES-006 §3.3 インデックス JSON スキーマ参照）
      - write_checksums_yaml() でチェックサム更新
      - エラーハンドリング（DES-006 §8 参照）：API キー未設定/429/部分失敗/中断再開
      - EMBEDDING_MODEL = "text-embedding-3-small" 定数をモジュールトップに定義
    acceptance_criteria: |
      --full でインデックスが生成され、差分モードで変更ファイルのみ API 呼び出しが行われる。
      API キー未設定時にエラー JSON が出力される。
      部分失敗時は成功分のみ保存されインデックスが破損しない。
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - plugins/doc-advisor/scripts/toc_utils.py
      - plugins/doc-advisor/scripts/create_pending_yaml.py
      - docs/specs/doc-advisor/semantic-query/requirements/NFR-003_standard_library_preferred_spec.md

  - task_id: TASK-003
    title: test_embed_docs.py — embed_docs.py ユニットテスト実装
    priority: 85
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-001
      - TASK-002
    group_id: "phase-2-scripts"
    build_check: per_task
    description:
      - build_embedding_text() のテスト（API 呼び出しなし）
      - インデックス JSON の読み書きラウンドトリップテスト
      - 差分検出ロジック（追加・変更・削除の 3 ケース）
      - --check モードの stale/ok 出力テスト（subprocess）
      - --full モードの API モックテスト（urllib.request.urlopen をパッチ）
      - API キー未設定時のエラー JSON 出力テスト
    acceptance_criteria: |
      全テストが OPENAI_API_KEY なしで実行できる
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - tests/doc_advisor/scripts/test_create_pending.py

  - task_id: TASK-004
    title: search_docs.py — セマンティック検索スクリプト実装
    priority: 90
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-001
    group_id: "phase-2-scripts"
    build_check: per_task
    description:
      - CLI の実装（--category, --query, --threshold オプション）（DES-006 §3.4 参照）
      - load_index() → クエリ Embedding → コサイン類似度計算 → 閾値フィルタ → JSON 出力
      - 件数上限なし（FNC-002 要件）
      - embed_docs.py の EMBEDDING_MODEL 定数を import してモデル一元管理
      - エラーケース：インデックス不在/stale/モデル不一致/API 失敗（DES-006 §3.4 参照）
      - エラーケース：--query 空文字/未指定時にエラー JSON を返す（FNC-001 §エラーケース参照）
      - stale 時は検索を実行せず error JSON を返す（FNC-002 要件）
    acceptance_criteria: |
      threshold 以上が全件返され、stale/モデル不一致時は error JSON が返される
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - plugins/doc-advisor/scripts/toc_utils.py

  - task_id: TASK-005
    title: test_search_docs.py — search_docs.py ユニットテスト実装
    priority: 85
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-001
      - TASK-004
    group_id: "phase-2-scripts"
    build_check: per_task
    description:
      - cosine_similarity() の数値検証（平行/直交/ゼロベクトル）
      - 閾値フィルタリングテスト（threshold 以上のみ返される）
      - 出力 JSON 形式テスト（status, query, results フィールド）
      - インデックス不在・stale・モデル不一致の各エラーケーステスト
      - 空クエリ時のエラー JSON 出力テスト
      - 件数上限なし検証（50 件返るケース）
    acceptance_criteria: |
      全テストが OPENAI_API_KEY なしで実行できる
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - tests/doc_advisor/scripts/test_create_pending.py

  - task_id: TASK-006
    title: grep_docs.py — 全文検索スクリプト実装
    priority: 90
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-001
    group_id: "phase-2-scripts"
    build_check: per_task
    description:
      - CLI の実装（--category, --keyword オプション）（DES-006 §3.5 参照）
      - init_common_config() → get_all_md_files() → 大文字小文字区別なし部分一致検索
      - 結果をプロジェクトルート相対パスで JSON 出力
      - エラーケース：--keyword 未指定/空文字/ConfigNotReadyError
      - 標準ライブラリのみ使用（外部ツール依存なし）
    acceptance_criteria: |
      キーワード部分一致（大文字小文字無視）が動作し、pip install 不要
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - plugins/doc-advisor/scripts/toc_utils.py

  - task_id: TASK-007
    title: test_grep_docs.py — grep_docs.py ユニットテスト実装
    priority: 85
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-001
      - TASK-006
    group_id: "phase-2-scripts"
    build_check: per_task
    description:
      - キーワード本文マッチのテスト
      - 大文字小文字無視テスト
      - 部分一致テスト
      - 該当なし → 空リストテスト
      - 出力 JSON 形式テスト
      - --keyword 未指定のエラー JSON テスト
    acceptance_criteria: |
      tmpdir + 仮文書で全ケースが独立してパスする
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - tests/doc_advisor/scripts/test_create_pending.py

  - task_id: TASK-008
    title: query-specs / query-rules SKILL.md を 3 モードハイブリッド検索に統合
    priority: 80
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-002
      - TASK-004
      - TASK-006
    group_id: "phase-2-skills"
    build_check: per_task
    description:
      - query-xxx を 3 モードスイッチャー（--toc / --index / auto）に書き換え（DES-006 §6.1 参照）
      - ワークフロー文書（query_toc_workflow.md / query_index_workflow.md）を新設
      - auto モードで Index → ToC の順に両方実行し、候補を union して AI が最終判定
      - query-xxx-index スキルを廃止（ディレクトリ削除）
      - plugin.json から query-xxx-index を削除
      - query-specs と query-rules の両方を更新
    acceptance_criteria: |
      両 SKILL.md が 3 モードスイッチャーとして動作し、
      query-xxx-index ディレクトリが削除されていること
    note: "実装結果: 当初設計（Embedding のみに置換）から変更。品質テストで ToC の優位性が確認されたため、ToC を維持しハイブリッド方式を採用"
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - plugins/doc-advisor/skills/query-specs/SKILL.md
      - plugins/doc-advisor/skills/query-rules/SKILL.md

  - task_id: TASK-009
    title: create-specs-toc / create-rules-toc SKILL.md に Index 構築ステップを追加
    priority: 80
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-002
      - TASK-004
      - TASK-006
    group_id: "phase-2-skills"
    build_check: per_task
    description:
      - 既存の 3 フェーズ ToC パイプラインは維持（品質テストで ToC の優位性が確認されたため）
      - Phase 4 として embed_docs.py --category {category} を追加（ToC 生成後に Index も構築）
      - create-specs-toc と create-rules-toc の両方を更新
    acceptance_criteria: |
      両 SKILL.md が ToC パイプライン + Index 構築の 4 フェーズ構成であること
    note: "実装結果: 当初設計（embed_docs.py 単一コマンドに置換）から変更。ToC パイプラインを維持し Index を追加ステップとして実行"
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - plugins/doc-advisor/skills/create-specs-toc/SKILL.md
      - plugins/doc-advisor/skills/create-rules-toc/SKILL.md

  - task_id: TASK-010
    title: ゴールデンセット作成と精度検証テスト（FNC-002）
    priority: 75
    status: completed
    design_id: DES-006
    depends_on:
      - TASK-008
      - TASK-009
    group_id: "phase-2-validation"
    build_check: per_task
    description:
      - tests/doc_advisor/golden_set/queries.yaml を作成（DES-006 §9.3 参照）
      - specs / rules 各カテゴリで最低 5 件ずつのテストクエリ + 正解文書ペアを作成
      - tests/doc_advisor/golden_set/test_golden_set.py を作成
      - search_docs.py を subprocess 呼び出しし、expected_paths が全件含まれるか検証
      - 見落とし 1 件でもテスト失敗（FNC-002 要件）
      - OPENAI_API_KEY 未設定時は skipTest でスキップ（CI 非破壊）
    acceptance_criteria: |
      queries.yaml に 10 件以上のクエリが存在し、
      test_golden_set.py が見落とし 0 件でパスする。
      OPENAI_API_KEY が設定された環境で embed_docs.py --full 実行済みであること。
    required_reading:
      - docs/specs/doc-advisor/semantic-query/design/DES-006_semantic_search_design.md
      - docs/specs/doc-advisor/semantic-query/requirements/FNC-002_zero_miss_search_accuracy_spec.md

