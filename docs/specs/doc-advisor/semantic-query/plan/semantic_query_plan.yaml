    depends_on:
      - TASK-001
    group_id: null
    build_check: per_task
    description:
      - build_embedding_text() のテスト（API 呼び出しなし）
      - インデックス JSON の読み書きラウンドトリップテスト
      - 差分検出ロジック（追加・変更・削除の 3 ケース）
      - --check モードの stale/ok 出力テスト（subprocess）
      - --full モードの API モックテスト（urllib.request.urlopen をパッチ）
      - API キー未設定時のエラー JSON 出力テスト
    acceptance_criteria: |
      全テストが OPENAI_API_KEY なしで実行できる
    required_reading:
