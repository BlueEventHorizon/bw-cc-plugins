# === タスク一覧 ===
tasks:
  - task_id: TASK-001
    title: "YamlReader: セッション YAML パーサー（server.py 内）"
    priority: 90
    status: completed
    design_id: DES-012
    depends_on: []
    group_id: null
    build_check: per_task
    description:
      - "設計書 3.2 節の YamlReader クラスを server.py 内に実装"
      - "read_session_dir() で session_dir 内の全ファイルを読み込み JSON 化"
      - "存在しないファイルは exists: false で返す"
      - "session.yaml_utils.parse_yaml() に委譲"
      - "テスト作成（フラット/リスト/ネスト/存在しないファイルの各パターン）"
    acceptance_criteria: "全 YAML パターンのパースが正しく動作し、テストが全パスすること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md
      - plugins/forge/docs/session_format.md

  - task_id: TASK-002
    title: "server.py: SSE サーバー本体"
    priority: 85
    status: completed
    design_id: DES-012
    depends_on:
      - TASK-001
    group_id: null
    build_check: per_task
    description:
      - "設計書 5.2〜5.3 節に基づき HTTP サーバーを実装（エンドポイント・SSE・ハートビート）"
      - "CLI: --dir <monitor-dir> --port <port>"
      - "monitor_dir の config.json から session_dir / template を読み込む"
      - "server.pid を起動時に書き込む。終了時に monitor_dir を削除する"
      - "ポートバインド失敗時のエラー JSON 出力"
      - "テスト作成（API エンドポイント、SSE Push、session_end、404）"
    acceptance_criteria: "サーバー起動 → /session で JSON 取得 → /notify で SSE Push が動作すること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md

  - task_id: TASK-003
    title: "notifier.py: PostToolUse フック通知スクリプト"
    priority: 80
    status: completed
    design_id: DES-012
    depends_on: []
    group_id: null
    build_check: per_task
    description:
      - "設計書 5.7 節に基づき Python フック通知スクリプトを実装"
      - ".claude/.temp/*-monitor/ の config.json をスキャン"
      - "server.pid が存在する monitor のみ処理（孤立 monitor を無視）"
      - "session_dir 配下のファイル更新のみ通知"
      - "サーバー未起動時は URLError をキャッチして無視（exit 0 保証）"
      - "テスト作成（session_dir フィルタ、server.pid フィルタ、Write/Edit 以外は無視）"
    acceptance_criteria: "session_dir 配下のファイルへの Write/Edit 時のみ SSE サーバーに通知されること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md

  - task_id: TASK-004
    title: "review_list.html: レビュー指摘一覧テンプレート"
    priority: 60
    status: completed
    design_id: DES-012
    depends_on:
      - TASK-002
    group_id: null
    build_check: per_task
    description:
      - "設計書 5.6 節の表示仕様に基づき実装"
      - "起動時に /session で現在状態を取得してレンダリング"
      - "EventSource で GET /sse に接続し、リアルタイム更新を受信"
      - "update イベント受信時に /session を再取得して再描画"
      - "session_end イベント受信時に「セッション終了」バナーを表示"
      - "フィルタータブ（All / 🔴 / 🟡 / 🟢 / ❌）"
      - "AI 推奨バッジ（fix / skip / review）+ AF マーク"
      - "ダークテーマ・モノスペース×サンセリフ・Google Fonts のみ"
      - "VanillaJS（ビルドツール不要）"
    acceptance_criteria: "ブラウザで plan.yaml の指摘事項がリアルタイム表示され、更新が自動反映されること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md
      - plugins/forge/docs/session_format.md

  - task_id: TASK-005
    title: "show_browser.py: エントリーポイント + SKILL.md"
    priority: 70
    status: completed
    design_id: DES-012
    depends_on:
      - TASK-002
    group_id: null
    build_check: per_task
    description:
      - "設計書 5.1 節に基づき show_browser.py を実装"
      - "CLI: --template --session-dir [--port] [--no-open]"
      - "孤立 monitor ディレクトリのクリーンアップ（設計書 5.10）"
      - "find_free_port() で 8765 から空きポートを自動検出"
      - "create_monitor_dir() で config.json を作成"
      - "server.py を fork 起動し server.pid 書き込みを待機"
      - "ブラウザ起動 + JSON 出力"
      - "SKILL.md 作成（AskUserQuestion 必須、user-invocable: true）"
      - "テスト作成（find_free_port, create_monitor_dir, cleanup_orphan_monitors）"
    acceptance_criteria: "show_browser.py 実行後、ブラウザが開きモニターが開始されること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md
      - docs/rules/skill_authoring_notes.md

  - task_id: TASK-006
    title: "フック設定登録 + README 更新"
    priority: 50
    status: completed
    design_id: DES-012
    depends_on:
      - TASK-003
      - TASK-005
    group_id: null
    build_check: per_task
    description:
      - ".claude/settings.json に PostToolUse フック設定を追記（matcher: Write|Edit）"
      - "README.md の forge Skills テーブルに show-browser を追記"
    acceptance_criteria: "フック設定後、SKILL がファイル更新するとブラウザがリアルタイム更新されること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md

  - task_id: TASK-007
    title: "review SKILL.md: show-browser 統合"
    priority: 50
    status: pending
    design_id: DES-012
    depends_on:
      - TASK-005
    group_id: null
    build_check: per_task
    description:
      - "review SKILL.md の「セッション作成」直後に show_browser.py 呼び出しステップを追加"
      - "引数: --template review_list --session-dir {session_dir}"
      - "show_browser.py 起動失敗時は review を続行する旨の注記を追加（非ブロッキング）"
      - "session_dir 削除でサーバー自動停止のため、完了処理での停止コードは不要"
      - "SKILL.md 変更のためテスト不要（implementation_guidelines.md: SKILL.md はテスト例外）"
    acceptance_criteria: "review SKILL.md の「セッション作成」直後に show_browser.py 呼び出しステップが追加されていること（diff で検証可能）"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md
      - plugins/forge/skills/review/SKILL.md

  - task_id: TASK-008
    title: "汎用セッションステータステンプレート作成"
    priority: 30
    status: pending
    design_id: DES-012
    depends_on:
      - TASK-002
    group_id: null
    build_check: per_task
    description:
      - "session_status.html テンプレートを templates/ に追加"
      - "session.yaml のメタデータ表示（スキル名・ステータス・開始時刻・Feature 名）"
      - "refs/ 配下の収集結果をリスト表示（specs.yaml / rules.yaml / code.yaml）"
      - "出力先ファイルの存在・最終更新時刻を表示"
      - "SSE による自動更新（review_list.html と同じ EventSource パターン）"
      - "ダークテーマ・同デザインシステム（review_list.html と統一）"
      - "HTML テンプレートのため Python テスト対象外。手動ブラウザ確認で検証"
    acceptance_criteria: "session.yaml メタデータ（スキル名・ステータス・開始時刻・Feature 名）、refs/ リスト（specs.yaml / rules.yaml / code.yaml）、出力先ファイルの存在状態がブラウザに表示されること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md
      - plugins/forge/docs/session_format.md

  - task_id: TASK-009
    title: "全オーケストレーター SKILL.md: show-browser 統合"
    priority: 20
    status: pending
    design_id: DES-012
    depends_on:
      - TASK-006
      - TASK-007
      - TASK-008
    group_id: null
    build_check: per_task
    description:
      - "start-design / start-plan / start-requirements / start-implement の各 SKILL.md にセッション作成直後の show_browser.py 呼び出しを追加"
      - "テンプレートは session_status（TASK-008 で作成）を使用"
      - "起動失敗時は本来のワークフローを続行する旨の注記を追加（非ブロッキング）"
      - "FNC-004（全オーケストレータ共通）要件の完了を確認"
      - "SKILL.md 変更のためテスト不要（implementation_guidelines.md: SKILL.md はテスト例外）"
    acceptance_criteria: "全オーケストレータ実行時にブラウザが自動的に開き、セッション状態がリアルタイム表示されること"
    required_reading:
      - docs/specs/forge/design/DES-012_show_browser_design.md
      - docs/specs/forge/requirements/skill_monitor_requirement.md

