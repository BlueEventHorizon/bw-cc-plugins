    status: completed
    design_id: ADR-032
    depends_on: []
    group_id: null
    build_check: skip
    description:
      - "§3 共通フィールド: session.yaml の files[] を [{path}] dict 配列形式に変更"
      - "§7 refs.yaml schema 章を全面改訂: target_files[] を [{path}] dict 配列に、ssot_refs[] の doc_path を path に、output_path を output_filename に"
