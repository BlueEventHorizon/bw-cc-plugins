    acceptance_criteria: 'grep -n "doc_path\|output_path:\|target_files:$" plugins/forge/docs/session_format.md が 0 件 (例 yaml 内含めて)'
    required_reading:
      - docs/specs/forge/design/ADR-032_path_schema_unification.md
      - plugins/forge/docs/session_format.md

