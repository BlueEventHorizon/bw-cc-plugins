      - "旧 schema (target_files に string array、ssot_refs に doc_path、review_packet に output_path) を渡したら明示的 ValueError で reject される回帰テストを追加"
      - "validate_review_packet を新 schema 専用に書き換え: target_files[] の各要素は dict + path フィールド必須、ssot_refs[].path 必須、output_filename 必須 (^review_[a-z0-9_-]+\\.md$ パターン維持)"
      - "旧キー名 (doc_path / output_path) を渡したら「ADR-032 で改名されました」エラーメッセージで reject"
    acceptance_criteria: "python3 -m unittest tests.forge.scripts.session.test_write_refs が新 schema 用に書き換えられた状態で全 pass"
    required_reading:
      - docs/specs/forge/design/ADR-032_path_schema_unification.md
      - plugins/forge/scripts/session/write_refs.py
      - tests/forge/scripts/session/test_write_refs.py

