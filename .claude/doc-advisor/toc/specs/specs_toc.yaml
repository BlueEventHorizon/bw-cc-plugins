      - "Decision B: Add explicit read-only constraints to Role section prohibiting Edit/Write/MultiEdit/Bash/Skill tools"
      - "Decision C: Clarify argument interpretation with examples (keywords/task description, not implementation instructions)"
      - "Decision D: Apply same three constraints to forge:query-forge-rules SKILL"
      - "Decision E: Add regression tests verifying context fork and read-only constraint text presence"
      - "Alternative options evaluated: context fork alone, Role constraints alone, physical tool denial, and adopted multi-layered defense"
