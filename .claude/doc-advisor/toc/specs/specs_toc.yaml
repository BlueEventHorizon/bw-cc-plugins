  docs/specs/forge/requirements/orchestrator_pattern.md:
    doc_type: requirement
    title: Orchestrator Pattern Requirements
    purpose: "Defines the forge orchestrator pattern: orchestrators delegate to subagents; session dir and session.yaml; self-contained docs; parallel steps; YAML vs Markdown by use case; review/ToC/commit after docs; no CLI parsers for natural-language args."
    content_details:
      - "User-invocable forge skills act as orchestrators: they manage flow and delegate search, review, and fixes to subagents; SKILL.md describes what to delegate, not low-level execution steps"
      - Orchestrator creates a session directory and initializes session.yaml; agents exchange paths and read/write files there instead of large in-prompt payloads
      - "Reference documents passed to agents must be self-contained under plugins/forge/docs/, with an exception for skill-local perspective docs in that skill's docs/"
      - Independent investigations (specs, rules, PRs, code) are structured for parallel runs with separate output files to prevent conflicts
      - YAML is used for machine-parseable, updatable artifacts such as plans with task IDs; Markdown for requirements and design including mermaid; format choice follows whether the primary consumer is code or humans
      - Document orchestrators run /forge:review --auto, /create-specs-toc when available, and /anvil:commit; start-implement skips ToC and ends with review then commit
      - No standalone finalize skill; each orchestrator invokes completion directly; human review remains inside the review workflow
      - User command arguments are interpreted by the model, not rigid token parsers; argument-parsing scripts are forbidden; AskUserQuestion fills gaps; scripts are limited to structured YAML/JSON handling
      - "Background: avoid God-Skill problems including context bloat, instruction drift, inability to parallelize, and loss under compression"
    applicable_tasks:
      - Forge skill orchestrator design and refactoring
      - Session directory and session protocol implementation
      - Designing parallel subagent workflows for forge
      - Selecting YAML vs Markdown for forge-generated artifacts
      - Implementing post-generation completion flows in document orchestrators
    keywords:
      - orchestrator
      - subagent
      - session.yaml
      - forge
      - parallel execution
      - AskUserQuestion
      - plugins/forge/docs
      - start-implement
      - God-Skill
  docs/specs/forge/requirements/skill_monitor_requirement.md:
    doc_type: requirement
    title: skill_monitor Requirements
    purpose: Specifies functional and non-functional requirements for real-time browser display of forge orchestrator session YAML via SSE, Claude Code PostToolUse hooks, and an independent SSE server without extra skill-side code.
    content_details:
      - Browser displays session YAML files per session_format.md schema; reads YAML directly without generating intermediate files such as display.json
      - Real-time updates via PostToolUse hook on Write/Edit under the session directory; SSE pushes change notifications to the browser
      - "Context isolation: skills only update existing session YAML; hooks run as shell scripts outside Claude context; SSE server runs as a separate process"
      - Works for all orchestrators (review, start-design, start-plan, start-requirements, start-implement); generic rendering driven by session file schema, not per-skill UI logic
      - SSE server exposes POST /notify, GET /sse, GET /session (YAML aggregated as JSON), GET /history; implemented with Python standard library only
      - Hooks register PostToolUse for Write/Edit; notify only when targets lie under .claude/.temp/ session paths; hooks in .claude/hooks/ via settings.json; hook failures must not affect skills (exit 0)
      - Browser UI loads initial state via GET /session; listens on SSE for file updates; static HTML and JavaScript without build tooling
      - "NFRs: stdlib-only SSE server, hook completes within 100ms, localhost-only listener, single-session display scope (multi-session deferred)"
      - Display targets include session.yaml, refs.yaml, review.md, plan.yaml, and refs/*.yaml when present; missing files are skipped
    applicable_tasks:
      - skill_monitor SSE server and hook implementation
      - Session monitor browser UI implementation
      - PostToolUse hook integration for session directory file changes
      - Forge orchestrator session visualization requirements review
    keywords:
      - skill_monitor
      - SSE
      - PostToolUse
      - session_format
      - display_notify
      - skill_monitor.py
      - orchestrator
      - session.yaml
      - plan.yaml
  docs/specs/xcode/requirements/REQ-001_doc_comments.md:
    doc_type: requirement
    title: "REQ-001: Swift Documentation Comment Generation Requirements"
    purpose: "Specifies requirements for DocC triple-slash documentation comments on Swift public APIs in the xcode plugin: detection rules, modes (--full, --force), parallel processing, CLI, safety (no code edits), and Quick Help quality."
    content_details:
      - Targets public/open and selected internal types; skips private/fileprivate, test and mock files, and declarations that already have /// or block doc comments
      - DocC structure with Parameter, Returns, and Throws for functions; AI writes intent-based summaries and may use tests as reference; optional broader coverage (e.g., properties) via flags
      - "Modes: default uncommitted files via git status, --full for entire tree, --force to overwrite existing ///, plus file or glob path selection"
      - "Safety: preserve // comments and non-comment code; default does not modify existing documentation comments or copyright headers"
      - "Parallel execution: one agent per Swift file, 5-10 concurrent workers, continue after per-file failures"
      - "CLI: /xcode:doc-comments with --full, --force, and path patterns; reports file count, generated count, skips, and errors"
      - Auto-invocation after Swift file create or edit with the same exclusion rules; processes touched files without multi-agent orchestration for that trigger
      - "NFR: valid Quick Help rendering; comment language matches project Japanese or English; independent from legacy create-code-headers file-header skill"
    applicable_tasks:
      - Implement or extend the xcode doc-comments skill and CLI
      - Review Swift API documentation comment generation scope and safety constraints
      - Plan doc-advisor code index alignment with triple-slash documentation coverage
    keywords:
      - DocC
      - Swift
      - Quick Help
      - xcode:doc-comments
      - git status
      - parallel agents
      - documentation comment
      - REQ-001
      - test exclusion
