    title: "COMMON-REQ-001: Phased Versioned Data Migration Requirements"
    purpose: Defines a phased migration framework for major-versioned data formats so legacy serialized data converts to the current format while preserving backward compatibility.
    content_details:
      - Major-version integers; missing or undetectable version treated as oldest (v1)
      - One-step migrations only (vN to vN+1); registry maps target version to function; no direct multi-version jumps
      - Apply ascending chain for detected_version < v <= current_version; each step consumes prior output
      - Idempotent pure transforms only; no file I/O, network, or other side effects
      - Exceptions propagate; no silent catch-all fallback; data newer than current_version passes through unchanged
      - In-memory transforms without rewriting source blobs; migration core must not depend on external libraries
      - "Extensibility: add one migrator entry and bump CURRENT_VERSION; existing migrators stay unchanged (open-closed)"
