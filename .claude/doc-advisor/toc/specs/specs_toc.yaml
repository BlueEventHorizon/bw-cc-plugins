  docs/specs/xcode/requirements/REQ-001_doc_comments.md:
    doc_type: requirement
    title: "REQ-001: Swift Documentation Comment Generation Requirements"
    purpose: "Specifies requirements for DocC triple-slash documentation comments on Swift public APIs in the xcode plugin: detection rules, modes (--full, --force), parallel processing, CLI, safety (no code edits), and Quick Help quality."
    content_details:
      - Targets public/open and selected internal types; skips private/fileprivate, test and mock files, and declarations that already have /// or block doc comments
      - DocC structure with Parameter, Returns, and Throws for functions; AI writes intent-based summaries and may use tests as reference; optional broader coverage (e.g., properties) via flags
      - "Modes: default uncommitted files via git status, --full for entire tree, --force to overwrite existing ///, plus file or glob path selection"
      - "Safety: preserve // comments and non-comment code; default does not modify existing documentation comments or copyright headers"
      - "Parallel execution: one agent per Swift file, 5-10 concurrent workers, continue after per-file failures"
      - "CLI: /xcode:doc-comments with --full, --force, and path patterns; reports file count, generated count, skips, and errors"
      - Auto-invocation after Swift file create or edit with the same exclusion rules; processes touched files without multi-agent orchestration for that trigger
      - "NFR: valid Quick Help rendering; comment language matches project Japanese or English; independent from legacy create-code-headers file-header skill"
    applicable_tasks:
      - Implement or extend the xcode doc-comments skill and CLI
      - Review Swift API documentation comment generation scope and safety constraints
      - Plan doc-advisor code index alignment with triple-slash documentation coverage
    keywords:
      - DocC
