    doc_type: requirement
    title: "COMMON-REQ-002: Error Handling Policy Requirements"
    purpose: Defines error-handling policy forbidding silent fallback and broad catches, allowing only external-factor exceptions with explicit reporting, and requiring pure functions to propagate internal bugs.
    content_details:
      - Applies to all Python scripts and SKILL.md project-wide
      - "FR-01: catch only external-factor errors; prohibit except Exception and bare except; propagate internal bugs (TypeError, KeyError, IndexError, AttributeError)"
      - "FR-02: allow file I/O, network, and narrow ValueError for conversion-only try blocks; HTTP server broad catch only as framework pattern with proper error handling"
      - "FR-03: on catch, return error to caller or stderr; JSON scripts return status and message fields; warnings and errors via sys.stderr not stdout"
      - "FR-04: pure functions must not mask bugs via rollback or returning prior state; validate with tests not defensive runtime catch"
      - Defines external-factor error, internal bug, and silent fallback
      - "Worked examples: load_config with parse_config outside try; migrations must propagate exceptions"
    applicable_tasks:
